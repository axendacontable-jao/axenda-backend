// ── Calendario vencimientos ──
function CalendarioVencimientos({ planes, clientes, tareas }) {
  const hoy=new Date(), año=hoy.getFullYear(), mes=hoy.getMonth();
  const clienteMap=Object.fromEntries(clientes.map(c=>[c.id,c]));
  const eventos={};
  function add(dia,ev){if(!eventos[dia])eventos[dia]=[];eventos[dia].push(ev);}
  // Cuota monotributo — verde
  add(20,{tipo:"cuota",label:"Cuota"});
  // Cortes recategorización — rojo
  if(mes===0)add(1,{tipo:"corte",label:"Corte recat."});
  if(mes===6)add(1,{tipo:"corte",label:"Corte recat."});
  // Planes de pago del mes — verde
  planes.filter(p=>p.proximo_venc&&p.estado==="activo").forEach(p=>{
    try{
      const d=new Date(p.proximo_venc);
      if(d.getFullYear()===año&&d.getMonth()===mes){
        const c=clienteMap[p.cliente_id];
        add(d.getDate(),{tipo:"plan",label:c?c.apellido:p.numero_plan||"Plan"});
      }
    }catch{}
  });
  // Tareas con fecha — amarillo
  (tareas||[]).filter(t=>t&&t.dia).forEach(t=>{
    const d=parseInt(t.dia);
    if(d>=1&&d<=31) add(d,{tipo:"tarea",label:t.label});
  });
  const diasEnMes=new Date(año,mes+1,0).getDate();
  let primerDia=new Date(año,mes,1).getDay();
  primerDia=primerDia===0?6:primerDia-1;
  const celdas=[];
  for(let i=0;i<Math.ceil((primerDia+diasEnMes)/7)*7;i++){
    const dia=i-primerDia+1;
    celdas.push(dia>=1&&dia<=diasEnMes?dia:null);
  }
  const DIAS=["Lu","Ma","Mi","Ju","Vi","Sá","Do"];
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div style={{fontSize:"12px",fontWeight:"600",color:"var(--blue)"}}>{MESES_FULL[mes]} {año}</div>
        <div style={{display:"flex",gap:"8px"}}>
          <span style={{fontSize:"10px",color:"var(--green)",fontWeight:"600"}}>● Clientes</span>
          <span style={{fontSize:"10px",color:"var(--yellow)",fontWeight:"600"}}>● Tareas</span>
          <span style={{fontSize:"10px",color:"var(--red)",fontWeight:"600"}}>● Cortes</span>
        </div>
      </div>
      <div className="cal-grid">
        {DIAS.map(d=><div key={d} className="cal-head">{d}</div>)}
        {celdas.map((dia,i)=>(
          <div key={i} className={`cal-day${dia===hoy.getDate()?" hoy":""}`} style={!dia?{background:"transparent"}:{}}>
            {dia&&<div className="cal-day-num">{dia}</div>}
            {dia&&(eventos[dia]||[]).map((ev,ei)=>(
              <div key={ei} className={`cal-event ${ev.tipo}`} title={ev.label}>{ev.label}</div>
            ))}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Resumen del mes ──
function ResumenMes({ clientes, factura, topes }) {
  const activos=clientes.filter(c=>c.activo);
  const topeMapa=Object.fromEntries(topes.map(t=>[t.categoria,t.tope_anual]));
  function pct(c){const tot=(factura[c.id]||[]).reduce((a,b)=>a+(b.monto||0),0);const t=topeMapa[c.categoria]||0;return t>0?tot/t:0;}
  const verde=activos.filter(c=>pct(c)>0&&pct(c)<0.6).length;
  const amarillo=activos.filter(c=>{const p=pct(c);return p>=0.6&&p<0.85;}).length;
  const rojo=activos.filter(c=>pct(c)>=0.85).length;
  const sinDatos=activos.filter(c=>!pct(c)).length;
  const total=activos.length||1;
  const catDist={};
  activos.forEach(c=>{if(c.categoria)catDist[c.categoria]=(catDist[c.categoria]||0)+1;});
  const catEntries=Object.entries(catDist).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxCat=Math.max(...catEntries.map(e=>e[1]),1);
  return (
    <div>
      <div style={{marginBottom:"14px"}}>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginBottom:"10px"}}>
          <span className="semaforo-mini semi-verde">{verde} en orden</span>
          <span className="semaforo-mini semi-amarillo">{amarillo} atención</span>
          <span className="semaforo-mini semi-rojo">{rojo} al límite</span>
          {sinDatos>0&&<span className="semaforo-mini semi-gris">{sinDatos} sin datos</span>}
        </div>
        <div className="bar-track" style={{height:"10px"}}>
          <div style={{height:"100%",display:"flex",borderRadius:"5px",overflow:"hidden"}}>
            <div style={{width:`${(verde/total)*100}%`,background:"var(--green)",transition:"width 0.6s"}}/>
            <div style={{width:`${(amarillo/total)*100}%`,background:"var(--yellow)",transition:"width 0.6s"}}/>
            <div style={{width:`${(rojo/total)*100}%`,background:"var(--red)",transition:"width 0.6s"}}/>
          </div>
        </div>
      </div>
      {catEntries.length>0&&(
        <div>
          <div style={{fontSize:"11px",fontWeight:"600",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:"10px"}}>Por categoría</div>
          {catEntries.map(([cat,n])=>(
            <div key={cat} className="resumen-bar-row">
              <div style={{width:"22px",fontFamily:"'DM Mono',monospace",fontWeight:"700",fontSize:"13px",color:"var(--blue)"}}>{cat}</div>
              <div className="resumen-bar-track"><div className="resumen-bar-fill fill-verde" style={{width:`${(n/maxCat)*100}%`}}/></div>
              <div style={{width:"22px",textAlign:"right",fontSize:"12px",fontWeight:"600",color:"var(--muted)"}}>{n}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Feed pendientes del mes ──
function PendientesFeed({ tareas }) {
  const hoy=new Date();
  const storageKey=`axenda_done_${hoy.getFullYear()}_${hoy.getMonth()+1}`;
  const [done,setDone]=useState(()=>{try{return JSON.parse(localStorage.getItem(storageKey)||"[]");}catch{return [];}});
  function toggle(label){const nd=done.includes(label)?done.filter(x=>x!==label):[...done,label];setDone(nd);localStorage.setItem(storageKey,JSON.stringify(nd));}
  if(!tareas)return <div style={{height:"80px",borderRadius:"8px"}} className="skeleton"/>;
  const sorted=[...tareas].sort((a,b)=>{
    if(a.dia&&!b.dia)return -1; if(!a.dia&&b.dia)return 1;
    if(a.dia&&b.dia)return a.dia-b.dia; return 0;
  });
  return (
    <div>
      {sorted.map((t,i)=>(
        <div key={i} className="tarea-item">
          <div className={`tarea-check ${done.includes(t.label)?"done":""}`} onClick={()=>toggle(t.label)}>{done.includes(t.label)&&"✓"}</div>
          {t.dia&&<div style={{fontSize:"10px",fontFamily:"'DM Mono',monospace",color:"var(--yellow)",fontWeight:"600",flexShrink:0,minWidth:"36px"}}>día {t.dia}</div>}
          <div className={`tarea-label ${done.includes(t.label)?"done":""}`}>{t.label}</div>
        </div>
      ))}
      <div style={{marginTop:"10px",fontSize:"11px",color:"var(--muted)"}}>{done.length}/{tareas.length} completadas · reset el 1/{hoy.getMonth()+2>12?1:hoy.getMonth()+2}</div>
    </div>
  );
}

  const hoy=new Date(), hoyDia=hoy.getDate();

    apiFetch(`${BACKEND_URL}/configuracion`).then(r=>r.json())
      .then(d=>setCfg({...DEFAULTS,...d}))

    setGKey(sKey);
    const payload={};
    claves.forEach(k=>{ payload[k]=cfg[k]??""; });
    try {
      await apiFetch(`${BACKEND_URL}/configuracion`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      setOkKey(sKey); setTimeout(()=>setOkKey(null),2500);
    } catch(e){ alert("Error al guardar: "+e.message); }
    setGKey(null);
  }

    const file=e.target.files[0]; if(!file) return;
    setImp(true);
    try {
      const fd=new FormData(); fd.append("file",file);
      const res=await apiFetch(`${BACKEND_URL}/topes/importar`,{method:"POST",body:fd});

      if(d.ok){ setIR(d); onRefresh(); }

    setImp(false);
    fileImpRef.current.value="";

  const SaveRow = ({claves, sKey}) => (
    <div style={{display:"flex",alignItems:"center",gap:"12px",marginTop:"6px"}}>
      <button className="btn-primary" style={{maxWidth:"140px"}} onClick={()=>guardar(claves,sKey)} disabled={guardandoKey===sKey}>

    <div>

        <div style={{fontSize:"20px",fontWeight:"700",marginTop:"2px"}}>Configuración</div>
      </div>

      <div className="tabs" style={{marginBottom:"24px"}}>
        {[["topes","Topes"],["estudio","Datos del estudio"],["whatsapp","Mensajes WhatsApp"],["sistema","Parámetros"],["tareas","Tareas mensuales"]].map(([k,l])=>(
          <button key={k} className={`tab-btn ${tab===k?"active":""}`} onClick={()=>setTab(k)}>{l}</button>

      </div>

      {/* ── Tab Topes ── */}
      {tab==="topes"&&(
        <div>
          <div className="detail-section" style={{marginBottom:"16px"}}>

            </p>
            <div style={{display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap"}}>
              <input ref={fileImpRef} type="file" accept=".pdf,.xlsx" style={{display:"none"}} onChange={importarTopes}/>
              <button className="btn-primary" style={{maxWidth:"220px"}} onClick={()=>fileImpRef.current.click()} disabled={importando}>

              {importResult&&(
                <span style={{fontSize:"12px",color:"var(--green)",fontWeight:"600"}}>
                  ✓ {importResult.actualizados} categorías actualizadas: {(importResult.categorias||[]).join(", ")}

              )}

          </div>
          <div className="table-wrap">
            <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",fontSize:"11px",fontWeight:"600",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.09em",background:"#FAFBFD"}}>
              Valores actuales
            </div>
            <table className="data-table">
              <thead><tr><th>Cat.</th><th>Tope anual</th><th>Cuota servicios</th><th>Cuota bienes</th></tr></thead>
              <tbody>
                {topes.map(t=>(
                  <tr key={t.categoria}>
                    <td style={{fontWeight:"700",fontFamily:"'DM Mono',monospace",fontSize:"17px",color:"var(--blue)",paddingLeft:"20px"}}>{t.categoria}</td>
                    <td style={{fontFamily:"'DM Mono',monospace"}}>{$$(t.tope_anual)}</td>
                    <td style={{fontFamily:"'DM Mono',monospace"}}>{t.cuota_servicios?$$(t.cuota_servicios):"—"}</td>
                    <td style={{fontFamily:"'DM Mono',monospace"}}>{t.cuota_bienes?$$(t.cuota_bienes):"—"}</td>

          <div className="form-group">
            <label className="form-label">WhatsApp del estudio</label>
            <input className="form-input" value={cfg.whatsapp_estudio||""} onChange={e=>setVal("whatsapp_estudio",e.target.value)} placeholder="2944xxxxxx"/>
          </div>
          <div className="form-group">
            <label className="form-label">Email</label>
            <input className="form-input" type="email" value={cfg.email_estudio||""} onChange={e=>setVal("email_estudio",e.target.value)} placeholder="axendacontable@gmail.com"/>
          </div>
          <SaveRow claves={["nombre_estudio","whatsapp_estudio","email_estudio"]} sKey="estudio"/>
        </div>
      )}

      {/* ── Tab WhatsApp ── */}
      {tab==="whatsapp"&&(
        <div>
          {[
            {k:"tpl_vencimiento_cuota", label:"Vencimiento de cuota"},
            {k:"tpl_alerta_limite",     label:"Alerta de límite de facturación"},
            {k:"tpl_vencimiento_plan",  label:"Vencimiento de plan de pago"},
          ].map(({k,label})=>(
            <div key={k} className="detail-section" style={{marginBottom:"14px"}}>
              <div className="section-title">{label}</div>
              <TemplateEditor value={cfg[k]||""} onChange={v=>setVal(k,v)} vars={TPL_VARS[k]}/>

      {/* ── Tab Sistema ── */}
      {tab==="sistema"&&(
        <div className="detail-section" style={{maxWidth:"440px"}}>

          <div className="form-group">

          <SaveRow claves={["dias_alerta_amarilla","ciclo_activo"]} sKey="sistema"/>

      )}

      {/* ── Tab Tareas ── */}
      {tab==="tareas"&&(()=>{
        const tareasArr=parseTareasArr(cfg.tareas_mensuales);
        function updateTareas(arr){ setVal("tareas_mensuales",JSON.stringify(arr.filter(t=>t.label&&t.label.trim()))); }
        return (
          <div className="detail-section" style={{maxWidth:"560px"}}>
            <div className="section-title">Tareas mensuales del Dashboard</div>
            <p style={{fontSize:"13px",color:"var(--muted)",lineHeight:"1.6",marginBottom:"4px"}}>
              Estas tareas aparecen en el Dashboard y se resetean al inicio de cada mes. El campo <strong>Día</strong> las muestra en el calendario (amarillo) y ordena la lista.
            </p>
            <div style={{display:"flex",gap:"8px",marginBottom:"12px",marginTop:"10px"}}>
              <div style={{flex:1,fontSize:"11px",fontWeight:"600",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em"}}>Tarea</div>
              <div style={{width:"72px",fontSize:"11px",fontWeight:"600",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.06em",textAlign:"center"}}>Día del mes</div>
              <div style={{width:"32px"}}/>
            </div>
            {tareasArr.map((t,i)=>(
              <div key={i} style={{display:"flex",gap:"8px",marginBottom:"8px",alignItems:"center"}}>
                <input className="form-input" style={{fontSize:"13px",flex:1}} value={t.label}
                  onChange={e=>{const arr=[...tareasArr];arr[i]={...arr[i],label:e.target.value};updateTareas(arr);}}/>
                <input className="form-input" type="number" min="1" max="31" placeholder="—"
                  style={{width:"72px",fontSize:"13px",textAlign:"center"}}
                  value={t.dia||""}
                  onChange={e=>{const arr=[...tareasArr];arr[i]={...arr[i],dia:e.target.value?parseInt(e.target.value):null};updateTareas(arr);}}/>
                <button className="table-action danger" style={{flexShrink:0}} onClick={()=>{const arr=[...tareasArr];arr.splice(i,1);updateTareas(arr);}}>×</button>
              </div>
            ))}
            <button className="filter-btn" style={{marginBottom:"16px",fontSize:"12px"}} onClick={()=>updateTareas([...tareasArr,{label:"Nueva tarea",dia:null}])}>+ Agregar tarea</button>
            <SaveRow claves={["tareas_mensuales"]} sKey="tareas"/>
          </div>

      })()}
    </div>
  );
}

function LoginScreen({ onLogin }) {
  const [email,setEmail]     = useState("");
  const [password,setPassword] = useState("");
  const [nombre,setNombre]   = useState("");
  const [modo,setModo]       = useState("login"); // login | register | verify
  const [cargando,setCargando] = useState(false);
  const [error,setError]     = useState("");

  async function handleSubmit(e) {
    e.preventDefault();
    setCargando(true); setError("");
    if (modo === "login") {
      const { data, error: err } = await db.auth.signInWithPassword({ email, password });
      if (err) setError(err.message === "Invalid login credentials" ? "Email o contraseña incorrectos" : err.message);
      else onLogin(data.session);
    } else {
      const { error: err } = await db.auth.signUp({
        email, password,
        options: { data: { nombre_estudio: nombre || "Mi Estudio" } }
      });
      if (err) setError(err.message);
      else setModo("verify");
    }
    setCargando(false);
  }

  const styles = {
    wrap: { minHeight:"100vh", background:"#F0F2F7", display:"flex", alignItems:"center", justifyContent:"center", padding:"20px" },
    card: { background:"#fff", borderRadius:"20px", padding:"40px 44px", width:"100%", maxWidth:"420px", boxShadow:"0 8px 40px rgba(27,45,79,0.13)" },
    logo: { textAlign:"center", marginBottom:"28px" },
    logoMain: { fontSize:"22px", fontWeight:"700", color:"#1B2D4F", letterSpacing:"0.06em" },
    logoSub: { fontSize:"10px", color:"#2BAF82", letterSpacing:"0.2em", textTransform:"uppercase", marginTop:"3px" },
    tabs: { display:"flex", background:"#EAF0F6", borderRadius:"10px", padding:"3px", marginBottom:"24px" },
    tab: (active) => ({ flex:1, padding:"9px", border:"none", borderRadius:"8px", fontSize:"13px", fontWeight:"600", cursor:"pointer", fontFamily:"inherit", background:active?"#fff":"transparent", color:active?"#1B2D4F":"#6B7A96", boxShadow:active?"0 1px 4px rgba(27,45,79,0.1)":"none", transition:"0.15s" }),
    err: { color:"#E04545", fontSize:"13px", background:"#FEE2E2", padding:"10px 12px", borderRadius:"8px", marginBottom:"12px" },
    verify: { textAlign:"center", padding:"10px 0" },
  };

  if (modo === "verify") return (
    <div style={styles.wrap}>
      <div style={styles.card}>
        <div style={styles.logo}><div style={styles.logoMain}>AXENDA</div><div style={styles.logoSub}>CONTABLE</div></div>
        <div style={styles.verify}>
          <div style={{fontSize:"44px",marginBottom:"16px"}}>📧</div>
          <div style={{fontSize:"17px",fontWeight:"700",color:"#1B2D4F",marginBottom:"10px"}}>Verificá tu email</div>
          <div style={{fontSize:"13px",color:"#6B7A96",lineHeight:"1.6",marginBottom:"24px"}}>
            Te enviamos un link a <strong>{email}</strong>.<br/>Hacé click en el link para activar tu cuenta.
          </div>
          <button className="btn-secondary" onClick={()=>setModo("login")}>← Volver al inicio</button>
        </div>
      </div>
    </div>
  );

  return (
    <div style={styles.wrap}>
      <div style={styles.card}>
        <div style={styles.logo}>
          <div style={styles.logoMain}>AXENDA</div>
          <div style={styles.logoSub}>CONTABLE</div>
        </div>
        <div style={styles.tabs}>
          {[["login","Iniciar sesión"],["register","Registrarse"]].map(([m,l])=>(
            <button key={m} style={styles.tab(modo===m)} onClick={()=>{setModo(m);setError("");}}>{l}</button>
          ))}
        </div>
        <form onSubmit={handleSubmit}>
          {modo==="register"&&(
            <div className="form-group">
              <label className="form-label">NOMBRE DEL ESTUDIO</label>
              <input className="form-input" type="text" value={nombre} onChange={e=>setNombre(e.target.value)}
                placeholder="Ej: Estudio Contable García" autoFocus/>
            </div>
          )}
          <div className="form-group">
            <label className="form-label">EMAIL</label>
            <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)}
              required autoFocus={modo==="login"}/>
          </div>
          <div className="form-group">
            <label className="form-label">CONTRASEÑA</label>
            <input className="form-input" type="password" value={password} onChange={e=>setPassword(e.target.value)}
              required minLength={6}/>
          </div>
          {error&&<div style={styles.err}>{error}</div>}
          <button className="btn-primary" type="submit" disabled={cargando}>
            {cargando ? "Cargando..." : modo==="login" ? "Entrar" : "Crear cuenta"}
          </button>
        </form>
      </div>
    </div>
  );
}

function App() {
  // ── Auth ──────────────────────────────────────────────────────────
  const [session,setSession]         = useState(null);
  const [authLoading,setAuthLoading] = useState(true);

  useEffect(()=>{
    db.auth.getSession().then(({data:{session:s}})=>{
      _session = s;
      setSession(s);
      setAuthLoading(false);
    });
    const { data:{ subscription } } = db.auth.onAuthStateChange((_ev, s)=>{
      _session = s;
      setSession(s);
    });
    return ()=>subscription.unsubscribe();
  },[]);

  async function logout(){
    await db.auth.signOut();
    _session = null;
    setSession(null);
  }

  // ── App state ──────────────────────────────────────────────────────
  const [clientes,setClientes]   = useState([]);
  const [factura,setFactura]     = useState({});
  const [topes,setTopes]         = useState([]);
  const [planes,setPlanes]       = useState([]);
  const [loading,setLoading]     = useState(true);
  const [filtro,setFiltro]       = useState("todos");
  const [busqueda,setBusqueda]   = useState("");
  const [modal,setModal]         = useState(false);
  const [toast,setToast]         = useState(null);
  const [importando,setImportando] = useState(null);
  const [importResult,setImportResult] = useState(null);
  const [seccion,setSeccion]     = useState("dashboard");
  const [clienteDetalle,setClienteDetalle] = useState(null);
  const [datosError,setDatosError]         = useState(null);
  const fileInputRef  = useRef(null);
  const importSlugRef = useRef(null);
  const dias = diasAlCorte();

  async function cargarDatos(){
    setLoading(true);
    setDatosError(null);
    console.log('[cargarDatos] iniciando, session uid:', _session?.user?.id);
    try {
      const clsR  = await apiFetch(`${BACKEND_URL}/clientes`);
      console.log('[cargarDatos] /clientes status:', clsR.status);
      if (!clsR.ok) {
        const e = await clsR.json().catch(()=>({}));
        console.error('[cargarDatos] /clientes error body:', e);
        setDatosError(`Error ${clsR.status}: ${e.detail || 'No se pudo cargar clientes'}`);
        setLoading(false);
        return;
      }
      const clsRes = await clsR.json();
      console.log('[cargarDatos] clientes recibidos:', Array.isArray(clsRes) ? clsRes.length : typeof clsRes);

      const planR = await apiFetch(`${BACKEND_URL}/planes`).catch(()=>null);
      const planRes = planR?.ok ? await planR.json().catch(()=>[]) : [];

      const [facRes,topRes] = await Promise.all([
        db.from("facturacion").select("*").then(r=>{ console.log('[cargarDatos] facturacion:', r.data?.length, r.error?.message); return r.data; }),
        db.from("topes_categoria").select("*").order("categoria").then(r=>r.data),
      ]);

      setClientes(Array.isArray(clsRes) ? clsRes : []);
      setTopes(topRes||[]);
      setPlanes(Array.isArray(planRes)?planRes:[]);
      const map={};
      (facRes||[]).forEach(f=>{if(!map[f.cliente_id])map[f.cliente_id]=[];map[f.cliente_id].push(f);});
      setFactura(map);
    }catch(e){
      console.error('[cargarDatos] excepcion:', e);
      setDatosError('Error inesperado: ' + e.message);
    }
    setLoading(false);
  }
  useEffect(()=>{ if(session) cargarDatos(); },[session]);
  function mostrarToast(msg){setToast(msg);setTimeout(()=>setToast(null),3500);}

  async function toggleActivo(c){
    await apiFetch(`${BACKEND_URL}/clientes/${c.slug}/toggle`,{method:"PATCH"});
    setClientes(prev=>prev.map(x=>x.id===c.id?{...x,activo:!x.activo}:x));
    mostrarToast(`${c.nombre} ${c.apellido} → ${!c.activo?"activo":"inactivo"}`);
  }
  async function actualizarEstadoPago(c,nuevoEstado,silencioso=false){
    try{await apiFetch(`${BACKEND_URL}/clientes/${c.slug}/estado-pago`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({estado_pago:nuevoEstado})});}catch{}
    setClientes(prev=>prev.map(x=>x.id===c.id?{...x,estado_pago:nuevoEstado}:x));
    if(!silencioso) mostrarToast(`${c.nombre} → ${nuevoEstado==="al_dia"?"pagado ✓":"pendiente"}`);
  }
  function abrirImport(slug){importSlugRef.current=slug;fileInputRef.current.value="";fileInputRef.current.click();}
  async function handleImportFile(e){
    const file=e.target.files[0]; if(!file) return;
    const slug=importSlugRef.current;
    setImportando(slug);
    try {
      const fd=new FormData(); fd.append("file",file);
      const res=await apiFetch(`${BACKEND_URL}/importar-comprobantes/${slug}`,{method:"POST",body:fd});
      const d=await res.json();
      if(d.ok){setImportResult({slug,meses:d.meses_importados,detalle:d.detalle});cargarDatos();}
      else alert("Error al importar: "+JSON.stringify(d));
    }catch(err){alert("Error al importar: "+err.message);}
    setImportando(null);
  }

  function calcPct(c){
    const total=(factura[c.id]||[]).reduce((a,b)=>a+(b.monto||0),0);
    const t=topes.find(t=>t.categoria===c.categoria);
    if(!t||!total) return 0;
    return Math.min(total/t.tope_anual,1.05);
  }
  const topeMapa  = Object.fromEntries(topes.map(t=>[t.categoria,t.tope_anual]));
  const activos   = clientes.filter(c=>c.activo);
  const enOrden   = activos.filter(c=>calcPct(c)<0.6).length;
  const atencion  = activos.filter(c=>{const p=calcPct(c);return p>=0.6&&p<0.85;}).length;
  const limite    = activos.filter(c=>calcPct(c)>=0.85).length;
  const filtrados = clientes
    .filter(c=>filtro==="todos"?true:filtro==="activos"?c.activo:!c.activo)
    .filter(c=>{if(!busqueda)return true;const q=busqueda.toLowerCase();return `${c.nombre} ${c.apellido} ${c.cuit}`.toLowerCase().includes(q);});
  const hoy=new Date();
  const titulos={dashboard:"Dashboard general",clientes:"Clientes",cuotas:"Cuotas del mes",planes:"Planes de pago",topes:"Topes de categoría",config:"Configuración"};
  function irSeccion(s){setSeccion(s);setClienteDetalle(null);setBusqueda("");}
  const clienteSeleccionado = clienteDetalle ? clientes.find(c=>c.slug===clienteDetalle) : null;

  // ── Auth guards ──────────────────────────────────────────────────
  if (authLoading) return (
    <div style={{minHeight:"100vh",background:"#F0F2F7",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",color:"#1B2D4F"}}>
        <div style={{fontSize:"22px",fontWeight:"700",letterSpacing:"0.06em",marginBottom:"8px"}}>AXENDA</div>
        <div style={{fontSize:"11px",color:"#6B7A96"}}>Cargando...</div>
      </div>
    </div>
  );
  if (!session) return <LoginScreen onLogin={s=>{ _session=s; setSession(s); }}/>;

  return (
    <div className="layout">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-main">AXENDA</div>
          <div className="logo-sub">Panel de administración</div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">Principal</div>
          <button className={`nav-btn ${seccion==="dashboard"&&!clienteDetalle?"active":""}`} onClick={()=>irSeccion("dashboard")}>◉ &nbsp;Dashboard</button>
          <button className={`nav-btn ${seccion==="clientes"&&!clienteDetalle?"active":""}`} onClick={()=>irSeccion("clientes")}>👥 &nbsp;Clientes</button>
          <div className="nav-section" style={{marginTop:"12px"}}>Vencimientos</div>
          <button className={`nav-btn ${seccion==="cuotas"?"active":""}`} onClick={()=>irSeccion("cuotas")}>💳 &nbsp;Cuotas del mes</button>
          <button className={`nav-btn ${seccion==="planes"?"active":""}`} onClick={()=>irSeccion("planes")}>📋 &nbsp;Planes de pago</button>
          <div className="nav-section" style={{marginTop:"12px"}}>Sistema</div>
          <button className={`nav-btn ${seccion==="topes"?"active":""}`} onClick={()=>irSeccion("topes")}>📊 &nbsp;Topes de categoría</button>
          <button className={`nav-btn ${seccion==="config"?"active":""}`} onClick={()=>irSeccion("config")}>⚙️ &nbsp;Configuración</button>
        </nav>
        <div className="sidebar-footer">
          <div className="footer-text" style={{marginBottom:"8px"}}>{session?.user?.email}</div>
          <button onClick={logout} style={{width:"100%",padding:"8px",background:"#243C65",border:"none",borderRadius:"7px",color:"#8CA0BE",fontSize:"12px",fontWeight:"500",cursor:"pointer",fontFamily:"inherit",transition:"0.15s"}}
            onMouseOver={e=>e.target.style.color="#E04545"} onMouseOut={e=>e.target.style.color="#8CA0BE"}>
            Cerrar sesión
          </button>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <div className="topbar-title">
            {clienteDetalle
              ? (clienteSeleccionado?`${clienteSeleccionado.nombre} ${clienteSeleccionado.apellido}`:"Detalle")
              : titulos[seccion]||"Dashboard"}
          </div>
          <div className="topbar-right">
            <div style={{fontSize:"12px",color:"#E8A020",fontWeight:"500"}}>⏱ {dias} días al corte</div>
            <div className="topbar-date">{MESES[hoy.getMonth()]} {hoy.getFullYear()}</div>
          </div>
        </div>

        <div className="content">
          {datosError && (
            <div style={{background:"#E0454514",border:"1px solid #E0454530",borderRadius:"12px",padding:"20px 24px",marginBottom:"20px",display:"flex",alignItems:"flex-start",gap:"14px"}}>
              <div style={{fontSize:"20px",flexShrink:0}}>⚠️</div>
              <div>
                <div style={{fontWeight:"600",color:"#E04545",marginBottom:"4px"}}>Error al cargar datos</div>
                <div style={{fontSize:"13px",color:"#6B7A96",marginBottom:"12px"}}>{datosError}</div>
                <button onClick={cargarDatos} style={{fontSize:"12px",background:"#1B2D4F",color:"#fff",border:"none",borderRadius:"8px",padding:"7px 16px",cursor:"pointer",fontFamily:"inherit",fontWeight:"500"}}>
                  Reintentar
                </button>
              </div>
            </div>
          )}
          {clienteDetalle ? (
            <ViewClienteDetalle
              cliente={clienteSeleccionado}
              movs={factura[clienteSeleccionado?.id]||[]}
              topes={topes}
              onBack={()=>setClienteDetalle(null)}
              onImportar={abrirImport}
              importando={importando}
              onActualizarEstado={actualizarEstadoPago}
              onPlanGuardado={async()=>{
                const planRes=await apiFetch(`${BACKEND_URL}/planes`).then(r=>r.json()).catch(()=>[]);
                setPlanes(Array.isArray(planRes)?planRes:[]);
              }}
              onActualizarCuota={(c, nuevaCuota)=>{
                setClientes(prev=>prev.map(x=>x.id===c.id?{...x,cuota:nuevaCuota}:x));
              }}
            />
          ) : seccion==="dashboard" ? (
            <ViewDashboard clientes={clientes} planes={planes} factura={factura} topes={topes} onNavigate={irSeccion}/>
          ) : seccion==="cuotas" ? (
            <ViewCuotas clientes={clientes} onActualizar={actualizarEstadoPago}/>
          ) : seccion==="planes" ? (
            <ViewPlanes clientes={clientes}/>
          ) : seccion==="topes" ? (
            <ViewTopes topes={topes}/>
          ) : seccion==="config" ? (
            <ViewConfig topes={topes} onRefresh={cargarDatos}/>
          ) : (
            <div>
              <div className="search-bar">
                <input className="search-input" placeholder="Buscar por nombre, apellido o CUIT..." value={busqueda} onChange={e=>setBusqueda(e.target.value)}/>
                {["todos","activos","inactivos"].map(f=>(
                  <button key={f} className={`filter-btn ${filtro===f?"active":""}`} onClick={()=>setFiltro(f)}>{f.charAt(0).toUpperCase()+f.slice(1)}</button>
                ))}
                <button className="add-btn" onClick={()=>setModal(true)}>+ Nuevo cliente</button>
              </div>
              {loading ? (
                <div className="clientes-grid">{[1,2,3,4].map(i=><div key={i} style={{height:"160px",borderRadius:"14px"}} className="skeleton"/>)}</div>
              ) : filtrados.length===0 ? (
                <div className="empty-state"><div className="empty-icon">👥</div><div className="empty-title">No hay clientes</div><div className="empty-desc">{busqueda?"Sin resultados.":"Agregá tu primer cliente."}</div></div>
              ) : (
                <div className="clientes-grid">
                  {filtrados.map(c=>{
                    const pct=calcPct(c);
                    const total=(factura[c.id]||[]).reduce((a,b)=>a+(b.monto||0),0);
                    const sem=semaforoInfo(pct);
                    const tope=topeMapa[c.categoria]||0;
                    return (
                      <div key={c.id} className={`cliente-card ${!c.activo?"inactivo":""}`} onClick={()=>setClienteDetalle(c.slug)}>
                        {!c.activo&&<div className="inactivo-badge">Inactivo</div>}
                        <div className="cliente-header">
                          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
                            <div className="cliente-avatar">{initials(c.nombre,c.apellido)}</div>
                            <div>
                              <div className="cliente-nombre">{c.nombre} {c.apellido}</div>
                              <div className="cliente-cat">{c.categoria?`Categoría ${c.categoria}`:"Sin categoría"}{c.cuit?` · ${c.cuit}`:""}</div>
                            </div>
                          </div>
                          <div className={`semaforo-pill ${sem.clase}`}>
                            <span style={{width:"6px",height:"6px",borderRadius:"50%",background:"currentColor",display:"inline-block"}}/>
                            {sem.label}
                          </div>
                        </div>
                        {tope>0&&(
                          <div className="cliente-bar-wrap">
                            <div className="cliente-bar-label"><span>Facturado: {$$(total)}</span><span>{Math.round(pct*100)}% de {$$(tope)}</span></div>
                            <div className="bar-track"><div className={`bar-fill ${sem.fillClass}`} style={{width:`${Math.min(pct*100,100)}%`}}/></div>
                          </div>
                        )}
                        <div className="cliente-footer">
                          <div>
                            <div className="cliente-cuota">{c.cuota?$$(c.cuota)+"/mes":"Cuota —"}</div>
                            <div className="cliente-dias">{dias} días al corte</div>
                          </div>
                          <div style={{display:"flex",flexDirection:"column",gap:"6px",alignItems:"flex-end"}} onClick={e=>e.stopPropagation()}>
                            <a className="cliente-link" href={`${PORTAL_URL}/?cliente=${c.slug}`} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()}>Ver portal ↗</a>
                            <button onClick={e=>{e.stopPropagation();abrirImport(c.slug);}} disabled={importando===c.slug} style={{fontSize:"11px",background:"none",border:"1px solid var(--border)",borderRadius:"6px",cursor:"pointer",fontFamily:"inherit",fontWeight:"500",color:"var(--muted)",padding:"3px 8px",opacity:importando===c.slug?0.6:1}}>{importando===c.slug?"Importando...":"↑ ARCA"}</button>
                            <button onClick={e=>{e.stopPropagation();toggleActivo(c);}} style={{fontSize:"11px",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:"500",color:c.activo?"#E04545":"#2BAF82"}}>{c.activo?"Desactivar":"Activar"}</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>
      </main>

      {modal&&<ModalNuevoCliente onClose={()=>setModal(false)} topes={topes} onGuardado={slug=>{cargarDatos();mostrarToast(`Cliente agregado.`);}}/>}
      {importResult&&<ModalImportResult result={importResult} onClose={()=>setImportResult(null)}/>}
      <input ref={fileInputRef} type="file" accept=".xlsx" style={{display:"none"}} onChange={handleImportFile}/>
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
