<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axenda Contable — Panel de Administración</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#F0F2F7; --card:#FFFFFF; --sidebar:#1B2D4F;
  --green:#2BAF82; --yellow:#E8A020; --red:#E04545;
  --blue:#1B2D4F; --text:#1B2D4F; --muted:#6B7A96;
  --border:#DDE3EE; --light:#EAF0F6;
}
body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); }
.layout { display:flex; min-height:100vh; }

/* SIDEBAR */
.sidebar { width:220px; background:var(--sidebar); position:fixed; top:0; left:0; bottom:0; display:flex; flex-direction:column; z-index:100; }
.sidebar-logo { padding:24px 20px 18px; border-bottom:1px solid #1F3358; }
.logo-main { font-size:16px; font-weight:700; color:var(--green); letter-spacing:0.04em; }
.logo-sub { font-size:10px; color:#5D8AB0; letter-spacing:0.14em; text-transform:uppercase; margin-top:2px; }
.sidebar-nav { padding:16px 12px; flex:1; overflow-y:auto; }
.nav-section { font-size:10px; color:#4D6A8A; letter-spacing:0.12em; text-transform:uppercase; padding:8px 10px 4px; font-weight:500; }
.nav-btn { display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:8px; font-size:13px; color:#8CA0BE; cursor:pointer; transition:0.15s; margin-bottom:2px; border:none; background:none; width:100%; text-align:left; font-family:inherit; }
.nav-btn:hover { background:#243C65; color:#E8EDF5; }
.nav-btn.active { background:#1E3A62; color:var(--green); font-weight:600; }
.sidebar-footer { padding:14px 16px; border-top:1px solid #1F3358; }
.footer-text { font-size:11px; color:#4D6A8A; text-align:center; }

/* MAIN */
.main { margin-left:220px; flex:1; }
.topbar { background:#fff; border-bottom:1px solid var(--border); padding:0 28px; height:58px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; box-shadow:0 1px 6px rgba(27,45,79,0.06); }
.topbar-title { font-size:15px; font-weight:600; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.topbar-date { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; }
.content { padding:28px; }

/* STAT CARDS */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; box-shadow:0 2px 8px rgba(27,45,79,0.04); }
.stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.09em; margin-bottom:8px; }
.stat-val { font-size:30px; font-weight:300; font-family:'DM Mono',monospace; line-height:1; }
.stat-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:3px 9px; border-radius:12px; font-weight:500; margin-top:8px; }
.badge-green { background:#2BAF8215; color:var(--green); }
.badge-yellow { background:#E8A02015; color:var(--yellow); }
.badge-red { background:#E0454514; color:var(--red); }
.badge-blue { background:#1B2D4F12; color:var(--blue); }

/* CLIENTES GRID */
.clientes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
.cliente-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; box-shadow:0 2px 8px rgba(27,45,79,0.04); cursor:pointer; transition:0.15s; position:relative; overflow:hidden; }
.cliente-card:hover { border-color:var(--green); transform:translateY(-1px); box-shadow:0 4px 16px rgba(27,45,79,0.1); }
.cliente-card.inactivo { opacity:0.55; }
.cliente-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.cliente-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#2BAF82,#1B2D4F); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#fff; flex-shrink:0; }
.cliente-nombre { font-size:14px; font-weight:600; }
.cliente-cat { font-size:12px; color:var(--muted); margin-top:1px; }
.semaforo-pill { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; letter-spacing:0.04em; }
.pill-verde { background:#2BAF8218; color:var(--green); border:1px solid #2BAF8230; }
.pill-amarillo { background:#E8A02018; color:var(--yellow); border:1px solid #E8A02030; }
.pill-rojo { background:#E0454514; color:var(--red); border:1px solid #E0454528; }
.pill-gris { background:#6B7A9614; color:var(--muted); border:1px solid #6B7A9628; }
.bar-track { height:5px; background:var(--light); border-radius:5px; overflow:hidden; }
.bar-fill { height:100%; border-radius:5px; transition:width 0.8s cubic-bezier(0.22,1,0.36,1); }
.fill-verde { background:linear-gradient(90deg,#2BAF82,#1E8F68); }
.fill-amarillo { background:linear-gradient(90deg,#E8A020,#F5C842); }
.fill-rojo { background:linear-gradient(90deg,#E04545,#C83030); }
.cliente-bar-wrap { margin:12px 0 8px; }
.cliente-bar-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:4px; }
.cliente-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
.cliente-cuota { font-size:13px; font-family:'DM Mono',monospace; font-weight:500; }
.cliente-dias { font-size:11px; color:var(--muted); }
.cliente-link { font-size:11px; color:var(--green); font-weight:500; text-decoration:none; display:flex; align-items:center; gap:4px; }
.inactivo-badge { position:absolute; top:12px; right:12px; background:#6B7A9614; color:var(--muted); font-size:10px; font-weight:600; padding:2px 8px; border-radius:10px; letter-spacing:0.06em; text-transform:uppercase; }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(27,45,79,0.45); display:flex; align-items:center; justify-content:center; z-index:200; backdrop-filter:blur(4px); padding:20px; }
.modal { background:#fff; border-radius:18px; padding:28px 32px; width:100%; max-width:480px; box-shadow:0 24px 60px rgba(27,45,79,0.2); max-height:90vh; overflow-y:auto; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:6px; }
.modal-sub { font-size:13px; color:var(--muted); margin-bottom:22px; }
.form-group { margin-bottom:14px; }
.form-label { font-size:12px; font-weight:600; color:var(--blue); margin-bottom:5px; display:block; letter-spacing:0.04em; }
.form-input { width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:9px; font-size:14px; font-family:inherit; color:var(--text); outline:none; transition:0.15s; background:#fff; }
.form-input:focus { border-color:var(--green); box-shadow:0 0 0 3px #2BAF8215; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.arca-result { background:var(--light); border-radius:9px; padding:12px 14px; margin-top:8px; border:1px solid #2BAF8228; }
.arca-result-label { font-size:10px; color:var(--green); font-weight:600; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:4px; }
.arca-result-val { font-size:14px; font-weight:600; }
.modal-actions { display:flex; gap:10px; margin-top:20px; }
.btn-primary { flex:1; padding:12px; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; transition:0.15s; font-family:inherit; }
.btn-primary:hover { background:#1E8F68; }
.btn-primary:disabled { background:#9DCFBC; cursor:not-allowed; }
.btn-secondary { padding:12px 20px; background:var(--light); color:var(--muted); border:none; border-radius:10px; font-size:14px; font-weight:500; cursor:pointer; transition:0.15s; font-family:inherit; }
.btn-secondary:hover { background:var(--border); }

/* SEARCH */
.search-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.search-input { flex:1; min-width:180px; padding:10px 16px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; font-family:inherit; outline:none; transition:0.15s; background:#fff; }
.search-input:focus { border-color:var(--green); }
.filter-btn { padding:10px 16px; border:1.5px solid var(--border); border-radius:10px; font-size:13px; font-weight:500; cursor:pointer; background:#fff; color:var(--muted); transition:0.15s; font-family:inherit; }
.filter-btn.active { border-color:var(--green); color:var(--green); background:#2BAF8210; }
.add-btn { padding:10px 18px; background:var(--green); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; transition:0.15s; font-family:inherit; display:flex; align-items:center; gap:6px; white-space:nowrap; }
.add-btn:hover { background:#1E8F68; }

/* EMPTY / LOADING */
.empty-state { text-align:center; padding:48px 20px; color:var(--muted); }
.empty-icon { font-size:44px; margin-bottom:10px; }
.empty-title { font-size:15px; font-weight:600; color:var(--blue); margin-bottom:6px; }
.empty-desc { font-size:13px; line-height:1.6; }
.skeleton { background:linear-gradient(90deg,#EAF0F6 25%,#DDE3EE 50%,#EAF0F6 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* TOAST */
.toast { position:fixed; bottom:24px; right:24px; background:var(--blue); color:#fff; padding:14px 20px; border-radius:12px; font-size:14px; font-weight:500; box-shadow:0 8px 24px rgba(27,45,79,0.3); z-index:999; animation:slide-up 0.3s ease; max-width:360px; }
@keyframes slide-up { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

/* TABLA */
.table-wrap { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
.data-table { width:100%; border-collapse:collapse; }
.data-table th { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.09em; padding:12px 16px; text-align:left; border-bottom:1px solid var(--border); background:#FAFBFD; }
.data-table td { padding:13px 16px; font-size:13px; border-bottom:1px solid #F2F4F8; vertical-align:middle; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tbody tr:hover td { background:#F8FAFC; }
.estado-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:3px 10px; border-radius:12px; }
.estado-al-dia { background:#2BAF8215; color:var(--green); }
.estado-debe { background:#E0454514; color:var(--red); }
.table-action { background:none; border:1px solid var(--border); border-radius:7px; padding:5px 12px; font-size:12px; font-weight:500; cursor:pointer; font-family:inherit; color:var(--muted); transition:0.15s; white-space:nowrap; }
.table-action:hover { border-color:var(--green); color:var(--green); }
.table-action.danger:hover { border-color:var(--red); color:var(--red); }
.table-action.success:hover { border-color:var(--green); color:var(--green); background:#2BAF8210; }

/* DETALLE CLIENTE */
.back-btn { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); font-weight:500; background:none; border:none; cursor:pointer; font-family:inherit; padding:0; margin-bottom:20px; transition:0.15s; }
.back-btn:hover { color:var(--text); }
.detail-header { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 24px; margin-bottom:20px; }
.detail-header-top { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
.detail-avatar { width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg,#2BAF82,#1B2D4F); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:#fff; flex-shrink:0; }
.detail-nombre { font-size:18px; font-weight:700; }
.detail-sub { font-size:13px; color:var(--muted); margin-top:3px; }
.detail-actions { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); }
.action-chip { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border:1.5px solid var(--border); border-radius:9px; font-size:13px; font-weight:500; cursor:pointer; background:#fff; color:var(--text); transition:0.15s; font-family:inherit; text-decoration:none; white-space:nowrap; }
.action-chip:hover { border-color:var(--green); color:var(--green); background:#2BAF8206; }
.action-chip.wa { border-color:#25D366; color:#25D366; }
.action-chip.wa:hover { background:#25D36610; }
.action-chip:disabled { opacity:0.5; cursor:not-allowed; }

/* TABS */
.tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:20px; overflow-x:auto; }
.tab-btn { padding:10px 18px; font-size:13px; font-weight:500; background:none; border:none; cursor:pointer; font-family:inherit; color:var(--muted); transition:0.15s; border-bottom:2px solid transparent; margin-bottom:-2px; white-space:nowrap; }
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--green); border-bottom-color:var(--green); font-weight:600; }

/* FACTURACION TAB */
.detail-section { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:22px; margin-bottom:16px; }
.section-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:16px; }
.month-row { display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid #F0F2F7; }
.month-row:last-child { border-bottom:none; }
.month-label { font-size:13px; font-weight:500; width:80px; flex-shrink:0; }
.month-bar-wrap { flex:1; }
.month-bar-track { height:6px; background:var(--light); border-radius:6px; overflow:hidden; }
.month-bar-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#2BAF82,#1E8F68); transition:width 0.6s ease; }
.month-amount { font-size:12px; font-family:'DM Mono',monospace; font-weight:500; text-align:right; width:86px; flex-shrink:0; }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #F0F2F7; }
.info-row:last-child { border-bottom:none; }
.info-key { font-size:12px; color:var(--muted); }
.info-val { font-size:13px; font-weight:600; }

/* PLAN CARD */
.plan-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px; margin-bottom:12px; }
.plan-card.cancelado { opacity:0.65; border-left:3px solid var(--green); }
.plan-card.caido     { opacity:0.65; border-left:3px solid var(--red); background:#E0454504; }
.plan-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.plan-num { font-size:15px; font-weight:700; font-family:'DM Mono',monospace; }
.plan-org-badge { font-size:11px; font-weight:600; padding:3px 9px; border-radius:10px; background:var(--light); color:var(--blue); }
.plan-meta { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:10px; }
.plan-meta-item { font-size:12px; color:var(--muted); }
.plan-meta-item strong { color:var(--text); font-weight:600; }
.plan-progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:4px; }
.plan-progress-track { height:5px; background:var(--light); border-radius:5px; overflow:hidden; margin-bottom:10px; }
.plan-progress-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#2BAF82,#1E8F68); }
.plan-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* ALERTAS */
.alert-item { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; padding:11px 14px; border-radius:10px; margin-bottom:8px; border-left:3px solid var(--border); background:var(--light); }
.alert-item.vencimiento { background:#E8A02006; border-left-color:var(--yellow); }
.alert-item.recategorizacion { background:#1B2D4F06; border-left-color:var(--blue); }
.alert-item.deuda { background:#E0454506; border-left-color:var(--red); }
.alert-item.manual { background:#2BAF8206; border-left-color:var(--green); }
.alert-left { display:flex; align-items:flex-start; gap:9px; }
.alert-icon { font-size:15px; flex-shrink:0; margin-top:1px; }
.alert-text { font-size:13px; line-height:1.5; }
.alert-tipo-badge { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
.alert-del { background:none; border:none; cursor:pointer; font-size:16px; color:var(--muted); padding:0; line-height:1; transition:0.15s; flex-shrink:0; }
.alert-del:hover { color:var(--red); }
.alert-form { background:var(--light); border:1px solid var(--border); border-radius:12px; padding:16px; margin-top:16px; }

/* DOCUMENTOS */
.doc-row { display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid #F0F2F7; }
.doc-row:last-child { border-bottom:none; }
.doc-info { flex:1; }
.doc-nombre { font-size:13px; font-weight:600; }
.doc-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.doc-link { font-size:12px; color:var(--green); font-weight:500; text-decoration:none; display:flex; align-items:center; gap:4px; }

/* TOPES (Configuración) */
.tope-input { padding:7px 10px; border:1.5px solid var(--border); border-radius:7px; font-size:13px; font-family:'DM Mono',monospace; width:130px; outline:none; transition:0.15s; background:#fff; }
.tope-input:focus { border-color:var(--green); }

/* VAR CHIPS (plantillas WA) */
.var-chip { font-size:11px; padding:3px 10px; border:1.5px solid var(--border); border-radius:20px; background:#fff; cursor:pointer; font-family:'DM Mono',monospace; color:var(--blue); font-weight:500; transition:0.15s; }
.var-chip:hover { border-color:var(--green); color:var(--green); background:#2BAF8208; }

/* TOPES CARDS */
.topes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
.tope-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; }
.tope-cat { font-size:32px; font-weight:300; font-family:'DM Mono',monospace; color:var(--blue); line-height:1; }
.tope-val { font-size:14px; font-weight:600; margin-top:6px; }
.tope-sub { font-size:11px; color:var(--muted); margin-top:2px; }

/* PLACEHOLDER */
.placeholder-view { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; color:var(--muted); text-align:center; }
.placeholder-icon { font-size:52px; margin-bottom:16px; opacity:0.35; }
.placeholder-title { font-size:16px; font-weight:600; color:var(--blue); margin-bottom:8px; }
.placeholder-desc { font-size:13px; line-height:1.6; max-width:320px; }

/* CUOTAS */
.cuotas-header { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }

/* CHIP ESTADO CUOTA */
.chip-estado { position:relative; display:inline-flex; align-items:center; gap:5px; padding:5px 11px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; border:none; font-family:inherit; transition:0.15s; line-height:1; }
.chip-al-dia { background:#2BAF8218; color:var(--green); border:1px solid #2BAF8230; }
.chip-debe { background:#E0454514; color:var(--red); border:1px solid #E0454528; }
.chip-vencida { background:#E8A02015; color:var(--yellow); border:1px solid #E8A02030; }
.chip-dropdown { position:absolute; top:calc(100% + 6px); right:0; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:0 8px 24px rgba(27,45,79,0.15); z-index:300; overflow:hidden; min-width:148px; }
.chip-dropdown-item { padding:10px 14px; font-size:13px; cursor:pointer; display:flex; align-items:center; gap:8px; transition:0.1s; }
.chip-dropdown-item:hover { background:var(--light); }

/* ALERT WIDGETS */
.widgets-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
.widget-alerta { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 18px; cursor:pointer; transition:0.15s; box-shadow:0 2px 8px rgba(27,45,79,0.04); }
.widget-alerta:hover { border-color:var(--yellow); transform:translateY(-1px); }
.widget-count { font-size:32px; font-weight:300; font-family:'DM Mono',monospace; line-height:1; color:var(--muted); }
.widget-label { font-size:11px; color:var(--muted); margin-top:5px; text-transform:uppercase; letter-spacing:0.08em; font-weight:500; }

/* DASHBOARD GRID */
.dash-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.dash-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px; overflow:hidden; }
.dash-card-title { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:14px; }

/* CALENDARIO */

function $$(n) {

}
function initials(n, a) { return ((n?.[0]||"")+(a?.[0]||"")).toUpperCase(); }
function parseArgDate(s) {
  if (!s || !s.trim()) return null;
  const p = s.trim().split("/");
  if (p.length !== 3 || p[2].length !== 4) return null;
  return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
}
function formatArgDate(iso) {
  if (!iso) return "—";
  try { const [y,m,d]=iso.split("T")[0].split("-"); return `${d}/${m}/${y}`; } catch { return iso; }
}
function tiempoRelativo(iso) {
  if (!iso) return "";

  const min=Math.round((ahora-d)/60000);
  if (min<1) return "ahora";

  if (dias<7) return `hace ${dias}d`;
  return d.toLocaleDateString("es-AR",{day:"numeric",month:"short"});
}

// ── Template editor (WhatsApp) ──
function TemplateEditor({ value, onChange, vars }) {
  const ref = useRef(null);
  function insertVar(v) {
    const el = ref.current;
    if (!el) { onChange(value + v); return; }
    const s = el.selectionStart, e = el.selectionEnd;
    onChange(value.substring(0, s) + v + value.substring(e));
    setTimeout(() => { el.selectionStart = el.selectionEnd = s + v.length; el.focus(); }, 0);
  }
  return (
    <div>
      <textarea ref={ref} className="form-input" style={{minHeight:"78px",resize:"vertical",lineHeight:"1.55"}} value={value} onChange={e=>onChange(e.target.value)}/>
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"8px",alignItems:"center"}}>
        <span style={{fontSize:"11px",color:"var(--muted)",fontWeight:"500"}}>Insertar:</span>
        {vars.map(v=><button key={v} className="var-chip" onClick={()=>insertVar(v)}>{v}</button>)}
      </div>
    </div>
  );
}

function ChipEstadoCuota({ cliente, onChange }) {
  const [open,setOpen]=useState(false);

  useEffect(()=>{
    if (!open) return;
    function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",h);
    return ()=>document.removeEventListener("mousedown",h);
  },[open]);
  const ESTADOS=[
    {k:"al_dia",label:"Al día",emoji:"✓",cls:"chip-al-dia"},

// ── Modal cargar documento ──
function ModalCargarDocumento({ slug, onClose, onGuardado }) {
  const [form,setForm]=useState({tipo:"constancia",nombre:"",fecha:"",url:""});
  const [guardando,setGuardando]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));

    if (!form.nombre&&!form.url) return;
    setGuardando(true);
    try {
      const payload={tipo:form.tipo,nombre:form.nombre||null,fecha:parseArgDate(form.fecha)||null,url:form.url||null};
      const res=await apiFetch(`${BACKEND_URL}/documentos/${slug}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      const d=await res.json();
      if(d.ok){onGuardado();onClose();}else alert("Error: "+JSON.stringify(d));
    }catch(e){alert("Error: "+e.message);}
    setGuardando(false);
  }
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:"420px"}}>
        <div className="modal-title">Cargar documento</div>

          <label className="form-label">Tipo</label>

          <div className="form-group"><label className="form-label">Fecha (dd/mm/aaaa)</label><input className="form-input" value={form.fecha} onChange={e=>set("fecha",e.target.value)} placeholder="20/01/2026"/></div>

          <button className="btn-secondary" onClick={onClose}>Cancelar</button>

function ModalNuevoCliente({ onClose, onGuardado, topes }) {

  const [buscando,setBuscando]=useState(false); const [padronOk,setPadronOk]=useState(false); const [guardando,setGuardando]=useState(false);

  async function buscarEnArca() {
    if (cuit.replace(/\D/g,"").length<11) return;
    setBuscando(true);
    try {
      const res=await apiFetch(`${BACKEND_URL}/padron/${cuit.replace(/\D/g,"")}`);
      if (!res.ok){alert("CUIT no encontrado en ARCA");setBuscando(false);return;}
      const d=await res.json();
      setNombre(d.nombre||""); setApellido(d.apellido||""); setPadronOk(true);
      const cat=(d.categoria||"").trim().charAt(0).toUpperCase();
      if (/^[A-K]$/.test(cat)) {
        setCategoria(cat);
        const topeObj=topes.find(t=>t.categoria===cat);
        if (topeObj?.cuota_servicios) setCuota(String(Math.round(topeObj.cuota_servicios)));
      }
    } catch(e){alert("Error consultando ARCA: "+e.message);}
    setBuscando(false);
  }
  function slug(){const a=apellido.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/\s+/g,"-");return `${a}-${cuit.replace(/\D/g,"")}`;}
  async function guardar(){
    if (!cuit||!nombre||!apellido) return;
    setGuardando(true);
    try {
      const res=await apiFetch(`${BACKEND_URL}/clientes`,{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({nombre,apellido,cuit:cuit.replace(/\D/g,""),whatsapp,categoria:categoria.toUpperCase()||null,cuota:cuota?parseFloat(cuota):null})});
      const d=await res.json();
      if(d.ok){onGuardado(d.slug);onClose();}else alert("Error: "+JSON.stringify(d));
    }catch(e){alert("Error: "+e.message);}
    setGuardando(false);
  }
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

          {padronOk&&<div className="arca-result"><div className="arca-result-label">✓ Encontrado en ARCA</div><div className="arca-result-val">{nombre} {apellido}</div></div>}
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Nombre</label><input className="form-input" value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ignacio"/></div>
          <div className="form-group"><label className="form-label">Apellido</label><input className="form-input" value={apellido} onChange={e=>setApellido(e.target.value)} placeholder="Celedon"/></div>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">Categoría</label>
            <select className="form-input" value={categoria} onChange={e=>setCategoria(e.target.value)}>
              <option value="">— elegir —</option>

          <div className="form-group"><label className="form-label">Cuota mensual</label><input className="form-input" value={cuota} onChange={e=>setCuota(e.target.value)} placeholder="28400" type="number"/></div>

          <button className="btn-primary" onClick={guardar} disabled={!cuit||!nombre||!apellido||guardando}>{guardando?"Guardando...":"Guardar cliente"}</button>
        </div>
      </div>

  );
}

    });
  }

  async function confirmarPagos() {
    setConfirmando(true);
    const entradas = Object.entries(seleccionadas);
    for (const [num, venc] of entradas) {
      await apiFetch(`${BACKEND_URL}/planes/${planIdGuardado}/cuotas/${num}/pagar`,{
        method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({vencimiento:venc})
      }).catch(()=>{});
    }
    setConfirmando(false);
    onClose();
  }

  if (paso===2) {
    const cantSel = Object.keys(seleccionadas).length;
    return (
      <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
        <div className="modal" style={{maxWidth:"580px"}}>
          <div className="modal-title">¿Cuáles cuotas ya están pagadas?</div>
          <div className="modal-sub">Seleccioná cada cuota abonada y si fue al 1er o 2do vencimiento. Podés omitir y ajustar después desde Planes de pago.</div>
          <div style={{maxHeight:"380px",overflowY:"auto",margin:"14px 0"}}>
            <div style={{display:"grid",gridTemplateColumns:"32px 80px 1fr 150px",gap:"6px 12px",fontSize:"11px",color:"var(--muted)",fontWeight:"600",padding:"0 4px 6px",borderBottom:"1px solid var(--border)",marginBottom:"4px"}}>
              <div>#</div><div>Fecha</div><div>Monto</div><div>Marcar como</div>
            </div>
            {cuotasInit.map(cu=>{
              const sel = seleccionadas[cu.numero_cuota];
              const fecha = cu.fecha_venc ? new Date(cu.fecha_venc+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
              return (
                <div key={cu.numero_cuota} style={{display:"grid",gridTemplateColumns:"32px 80px 1fr 150px",gap:"6px 12px",fontSize:"13px",padding:"7px 4px",borderBottom:"1px solid var(--border)",alignItems:"center",background:sel?"#2BAF8206":"transparent"}}>
                  <div style={{fontWeight:"700",color:"var(--muted)"}}>{cu.numero_cuota}</div>
                  <div style={{fontSize:"12px",color:"var(--muted)"}}>{fecha}</div>
                  <div style={{fontFamily:"'DM Mono',monospace"}}>{$$(cu.monto_primer_venc)}</div>
                  <div style={{display:"flex",gap:"5px"}}>
                    <button onClick={()=>toggleSel(cu.numero_cuota,"1ro")}
                      style={{fontSize:"11px",padding:"3px 8px",border:`1px solid ${sel==="1ro"?"var(--green)":"var(--border)"}`,borderRadius:"6px",background:sel==="1ro"?"#2BAF8215":"transparent",color:sel==="1ro"?"var(--green)":"var(--muted)",cursor:"pointer",fontWeight:sel==="1ro"?"700":"400"}}>
                      {sel==="1ro"?"✓ 1er":"1er venc."}
                    </button>
                    <button onClick={()=>toggleSel(cu.numero_cuota,"2do")} disabled={sel==="1ro"}
                      style={{fontSize:"11px",padding:"3px 8px",border:`1px solid ${sel==="2do"?"var(--yellow)":"var(--border)"}`,borderRadius:"6px",background:sel==="2do"?"#E8A02015":"transparent",color:sel==="2do"?"var(--yellow)":sel==="1ro"?"var(--light)":"var(--muted)",cursor:sel==="1ro"?"not-allowed":"pointer",fontWeight:sel==="2do"?"700":"400"}}>
                      {sel==="2do"?"✓ 2do":"2do venc."}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:"13px",color:"var(--muted)",marginBottom:"12px"}}>
            {cantSel>0 ? <span style={{color:"var(--green)",fontWeight:"600"}}>{cantSel} cuota{cantSel!==1?"s":""} seleccionada{cantSel!==1?"s":""}</span> : "Ninguna cuota seleccionada"}
          </div>
          <div className="modal-actions">
            <button className="btn-secondary" onClick={onClose}>Omitir</button>
            <button className="btn-primary" onClick={confirmarPagos} disabled={confirmando||cantSel===0}>{confirmando?"Guardando...":"Confirmar pagadas"}</button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:"520px"}}>
        <div className="modal-title">Nuevo plan de pago</div>
        <div className="modal-sub">Cargá los datos del plan consolidado en ARCA u otro organismo.</div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Nro. de plan</label><input className="form-input" value={form.numero_plan} onChange={e=>set("numero_plan",e.target.value)} placeholder="V601877"/></div>
          <div className="form-group">
            <label className="form-label">Organismo</label>
            <select className="form-input" value={form.organismo} onChange={e=>set("organismo",e.target.value)}>
              {ORGANISMOS.map(o=><option key={o} value={o}>{o}</option>)}
            </select>
          </div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Fecha consolidación</label><input className="form-input" value={form.fecha_consolidacion} onChange={e=>set("fecha_consolidacion",e.target.value)} placeholder="20/01/2026"/></div>
          <div className="form-group"><label className="form-label">Próximo vencimiento</label><input className="form-input" value={form.proximo_venc} onChange={e=>set("proximo_venc",e.target.value)} placeholder="16/06/2026"/></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Cuotas pagas</label><input className="form-input" type="number" value={form.cuotas_pagas} onChange={e=>set("cuotas_pagas",e.target.value)} placeholder="2"/></div>
          <div className="form-group"><label className="form-label">Total cuotas</label><input className="form-input" type="number" value={form.total_cuotas} onChange={e=>set("total_cuotas",e.target.value)} placeholder="12"/></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label className="form-label">Monto 1ra cuota</label><input className="form-input" type="number" value={form.monto_primer_venc} onChange={e=>set("monto_primer_venc",e.target.value)} placeholder="90440.13"/></div>
          <div className="form-group"><label className="form-label">Monto 2da cuota</label><input className="form-input" type="number" value={form.monto_segundo_venc} onChange={e=>set("monto_segundo_venc",e.target.value)} placeholder="91269.16"/></div>
        </div>
        <div className="form-group"><label className="form-label">URL del PDF (opcional)</label><input className="form-input" value={form.url_pdf} onChange={e=>set("url_pdf",e.target.value)} placeholder="https://drive.google.com/..."/></div>
        <div className="modal-actions">
          <button className="btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={guardar} disabled={!form.numero_plan||guardando}>{guardando?"Guardando...":"Guardar plan"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Vista detalle cliente ──
function ViewClienteDetalle({ cliente, movs, topes, onBack, onImportar, importando, onActualizarEstado, onPlanGuardado, onActualizarCuota }) {
  const [tab, setTab]             = useState("facturacion");
  const [planes, setPlanes]       = useState(null);
  const [alertas, setAlertas]     = useState(null);
  const [docs, setDocs]           = useState(null);
  const [modalPlan, setModalPlan] = useState(false);
  const [planInicial, setPlanInicial] = useState(null);
  const [modalDoc, setModalDoc]   = useState(false);
  const [nuevaAlerta, setNuevaAlerta] = useState({ tipo:"vencimiento", mensaje:"" });
  const [cargandoTab, setCargandoTab] = useState(false);
  const [parsandoPlan, setParsandoPlan] = useState(false);
  const [editandoCuota, setEditandoCuota] = useState(false);
  const [cuotaInput, setCuotaInput]       = useState("");
  const pdfPlanRef = useRef(null);
  const dias = diasAlCorte();

  async function parsarPDF(e) {
    const file = e.target.files[0]; if (!file) return;
    setParsandoPlan(true);
    try {
      const fd = new FormData(); fd.append("file", file);
      const res = await apiFetch(`${BACKEND_URL}/planes/parsear-pdf`, {method:"POST", body:fd});
      const d = await res.json();
      if (d.ok) { setPlanInicial(d); setModalPlan(true); }
      else alert("No se pudo parsear el PDF: "+JSON.stringify(d));
    } catch(e) { alert("Error: "+e.message); }
    setParsandoPlan(false);
    pdfPlanRef.current.value = "";
  }

  async function guardarCuota() {
    const val = parseFloat(cuotaInput.replace(/\./g,"").replace(",","."));
    if (isNaN(val) || val <= 0) { alert("Cuota inválida"); return; }
    await apiFetch(`${BACKEND_URL}/clientes/${cliente.slug}/cuota`, {
      method:"PATCH", headers:{"Content-Type":"application/json"}, body:JSON.stringify({cuota:val})
    }).catch(()=>{});
    onActualizarCuota && onActualizarCuota(cliente, val);
    setEditandoCuota(false);
  }

  useEffect(() => {
    if (!cliente) return;
    if (tab === "planes" && planes === null) {
      setCargandoTab(true);
      apiFetch(`${BACKEND_URL}/planes/${cliente.slug}`)
        .then(r=>r.json()).then(d=>{ setPlanes(Array.isArray(d)?d:[]); setCargandoTab(false); })
        .catch(()=>{ setPlanes([]); setCargandoTab(false); });
    }
    if (tab === "alertas" && alertas === null) {
      setCargandoTab(true);
      apiFetch(`${BACKEND_URL}/alertas/${cliente.slug}`)
        .then(r=>r.json()).then(d=>{ setAlertas(Array.isArray(d)?d:[]); setCargandoTab(false); })
        .catch(()=>{ setAlertas([]); setCargandoTab(false); });
    }
    if (tab === "documentos" && docs === null) {
      setCargandoTab(true);
      db.from("documentos").select("*").eq("cliente_id", cliente.id).order("created_at",{ascending:false})
        .then(r=>{ setDocs(r.data||[]); setCargandoTab(false); })
        .catch(()=>{ setDocs([]); setCargandoTab(false); });
    }
  }, [tab, cliente]);

  async function recargarPlanes() {
    const res = await apiFetch(`${BACKEND_URL}/planes/${cliente.slug}`);
    const d = await res.json();
    setPlanes(Array.isArray(d)?d:[]);
    if (onPlanGuardado) onPlanGuardado();
  }

  async function cambiarEstadoPlan(planId, nuevoEstado) {
    const msgs = {
      cancelado:"¿Marcar este plan como CANCELADO (pagado por completo)?",
      caido:"¿Marcar este plan como CAÍDO (en incumplimiento)?",
      activo:"¿Reactivar este plan?",
      inactivo:"¿Eliminar este plan? No aparecerá más en el historial.",
    };
    if (!confirm(msgs[nuevoEstado]||"¿Confirmar?")) return;
    await apiFetch(`${BACKEND_URL}/planes/${planId}/estado`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({estado:nuevoEstado})});
    recargarPlanes();
  }

  async function marcarCuotaPagada(planId) {
    const res = await apiFetch(`${BACKEND_URL}/planes/${planId}/pagar`,{method:"PATCH"});
    const d = await res.json();
    if (d.ok) setPlanes(prev=>prev.map(p=>p.id===planId?{...p,cuotas_pagas:d.cuotas_pagas,estado:d.estado}:p));
  }

  async function crearAlerta() {
    if (!nuevaAlerta.mensaje.trim()) return;
    await apiFetch(`${BACKEND_URL}/alertas/${cliente.slug}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(nuevaAlerta)});
    setNuevaAlerta({tipo:"vencimiento",mensaje:""});
    const res = await apiFetch(`${BACKEND_URL}/alertas/${cliente.slug}`);
    setAlertas(await res.json());
  }

  async function eliminarAlerta(id) {
    await apiFetch(`${BACKEND_URL}/alertas/${id}`,{method:"DELETE"});
    setAlertas(prev=>prev.filter(a=>a.id!==id));
  }

  if (!cliente) return (<div><button className="back-btn" onClick={onBack}>← Volver</button><div className="empty-state"><div className="empty-title">Cliente no encontrado</div></div></div>);

  const topeObj   = topes.find(t=>t.categoria===cliente.categoria);
  const tope_anual = topeObj?.tope_anual || 0;
  const total_fac  = movs.reduce((a,b)=>a+(b.monto||0),0);
  const pct        = tope_anual>0 ? Math.min(total_fac/tope_anual,1.05) : 0;
  const sem        = semaforoInfo(pct);
  const historial  = [...movs].filter(f=>f.monto>0).sort((a,b)=>a.anio===b.anio?a.mes-b.mes:a.anio-b.anio);
  const maxMonto   = Math.max(...historial.map(f=>f.monto),1);

  return (
    <div>
      <button className="back-btn" onClick={onBack}>← Volver al listado</button>

      {/* Header */}
      <div className="detail-header">
        <div className="detail-header-top">
          <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
            <div className="detail-avatar">{initials(cliente.nombre,cliente.apellido)}</div>
            <div>
              <div className="detail-nombre">{cliente.nombre} {cliente.apellido}</div>
              <div className="detail-sub">{cliente.categoria?`Categoría ${cliente.categoria}`:"Sin categoría"}{cliente.cuit?` · ${cliente.cuit}`:""}</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
            {onActualizarEstado&&<ChipEstadoCuota cliente={cliente} onChange={onActualizarEstado}/>}
            <div className={`semaforo-pill ${sem.clase}`}>
              <span style={{width:"6px",height:"6px",borderRadius:"50%",background:"currentColor",display:"inline-block"}}/>
              {sem.label}
            </div>
            {!cliente.activo&&<span style={{fontSize:"11px",background:"#6B7A9614",color:"var(--muted)",padding:"4px 10px",borderRadius:"20px",fontWeight:"600"}}>INACTIVO</span>}
          </div>
        </div>
        <div className="detail-actions">
          {cliente.whatsapp&&(
            <button className="action-chip wa" onClick={()=>{const msg=encodeURIComponent(`Hola ${cliente.nombre}, te escribo desde Axenda Contable.`);window.open(`https://wa.me/549${cliente.whatsapp}?text=${msg}`,"_blank");}}>
              💬 WhatsApp
            </button>
          )}
          <button className="action-chip" onClick={()=>onImportar(cliente.slug)} disabled={importando===cliente.slug}>
            ↑ {importando===cliente.slug?"Importando...":"Importar ARCA"}
          </button>
          <a className="action-chip" href={`${PORTAL_URL}/?cliente=${cliente.slug}`} target="_blank" rel="noopener">↗ Ver portal</a>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        {["facturacion","planes","documentos","alertas"].map(t=>(
          <button key={t} className={`tab-btn ${tab===t?"active":""}`} onClick={()=>setTab(t)}>
            {t==="facturacion"?"Facturación":t==="planes"?"Planes de pago":t==="documentos"?"Documentos":"Alertas"}
            {t==="planes"&&planes&&planes.filter(p=>p.estado==="activo").length>0&&(
              <span style={{marginLeft:"6px",background:"var(--blue)",color:"#fff",borderRadius:"10px",fontSize:"10px",fontWeight:"700",padding:"1px 7px"}}>{planes.filter(p=>p.estado==="activo").length}</span>
            )}
          </button>
        ))}
      </div>

      {/* Tab: Facturación */}
      {tab==="facturacion"&&(
        <div>
          {tope_anual>0&&(
            <div className="detail-section">
              <div className="section-title">Facturación anual</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"10px"}}>
                <div>
                  <div style={{fontSize:"26px",fontWeight:"300",fontFamily:"'DM Mono',monospace",lineHeight:1}}>{$$(total_fac)}</div>
                  <div style={{fontSize:"12px",color:"var(--muted)",marginTop:"4px"}}>de {$$(tope_anual)} anuales</div>
                </div>
                <div style={{fontSize:"24px",fontWeight:"600",fontFamily:"'DM Mono',monospace",color:sem.color}}>{Math.round(pct*100)}%</div>
              </div>
              <div className="bar-track" style={{height:"8px"}}>
                <div className={`bar-fill ${sem.fillClass}`} style={{width:`${Math.min(pct*100,100)}%`}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"var(--muted)",marginTop:"6px"}}>
                <span>{dias} días al corte</span>
                <span style={{color:pct>=1?"var(--red)":pct>=0.6?"var(--yellow)":"var(--green)",fontWeight:"500"}}>
                  {pct>=1?`${$$(total_fac-tope_anual)} en exceso`:`${$$(tope_anual-total_fac)} margen restante`}
                </span>
              </div>
            </div>
          )}
          <div className="detail-section">
            <div className="section-title">Historial mes a mes</div>
            {historial.length===0 ? (
              <div style={{textAlign:"center",padding:"24px",color:"var(--muted)",fontSize:"13px"}}>Sin datos. Importá los comprobantes desde ARCA.</div>
            ) : historial.map((f,i)=>(
              <div key={i} className="month-row">
                <div className="month-label">{MESES[f.mes-1]} {f.anio}</div>
                <div className="month-bar-wrap"><div className="month-bar-track"><div className="month-bar-fill" style={{width:`${Math.round((f.monto/maxMonto)*100)}%`}}/></div></div>
                <div className="month-amount">{$$(f.monto)}</div>
              </div>
            ))}
          </div>
          <div className="detail-section">
            <div className="section-title">Datos del cliente</div>
            <div className="info-row"><div className="info-key">CUIT</div><div className="info-val" style={{fontFamily:"'DM Mono',monospace"}}>{cliente.cuit||"—"}</div></div>
            <div className="info-row"><div className="info-key">Categoría</div><div className="info-val">{cliente.categoria?`Categoría ${cliente.categoria}`:"—"}</div></div>
            <div className="info-row">
              <div className="info-key">Cuota mensual</div>
              <div className="info-val" style={{display:"flex",alignItems:"center",gap:"8px"}}>
                {editandoCuota ? (
                  <>
                    <input
                      className="form-input"
                      style={{width:"120px",padding:"3px 8px",fontSize:"13px",height:"28px"}}
                      value={cuotaInput}
                      onChange={e=>setCuotaInput(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter")guardarCuota();if(e.key==="Escape")setEditandoCuota(false);}}
                      autoFocus
                      placeholder="ej: 95000"
                      type="number"
                    />
                    <button className="table-action success" style={{padding:"3px 10px",fontSize:"12px"}} onClick={guardarCuota}>Guardar</button>
                    <button className="table-action" style={{padding:"3px 10px",fontSize:"12px"}} onClick={()=>setEditandoCuota(false)}>Cancelar</button>
                  </>
                ) : (
                  <>
                    <span>{cliente.cuota?$$(cliente.cuota):"—"}</span>
                    <button className="table-action" style={{padding:"2px 8px",fontSize:"11px"}} onClick={()=>{setCuotaInput(cliente.cuota?String(cliente.cuota):"");setEditandoCuota(true);}}>✏ Editar</button>
                  </>
                )}
              </div>
            </div>
            <div className="info-row"><div className="info-key">WhatsApp</div><div className="info-val">{cliente.whatsapp||"—"}</div></div>
            {cliente.email&&<div className="info-row"><div className="info-key">Email</div><div className="info-val" style={{fontSize:"12px"}}>{cliente.email}</div></div>}
          </div>
          {cliente.cuota&&(
            <div className="detail-section">
              <div className="section-title">Historial de cuotas mensuales</div>
              <HistorialCuotas slug={cliente.slug} cuota={cliente.cuota} categoria={cliente.categoria} onToggleMesActual={(pagado)=>onActualizarEstado&&onActualizarEstado(cliente,pagado?"al_dia":"debe",true)}/>
            </div>
          )}
        </div>
      )}

      {/* Tab: Planes */}
      {tab==="planes"&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
            <div style={{fontSize:"14px",fontWeight:"600"}}>Planes de {cliente.nombre}</div>
            <div style={{display:"flex",gap:"8px"}}>
              <button className="filter-btn" style={{fontSize:"12px"}} onClick={()=>{setPlanInicial(null);pdfPlanRef.current.click();}} disabled={parsandoPlan}>
                {parsandoPlan?"Procesando...":"↑ Parsear PDF"}
              </button>
              <button className="add-btn" onClick={()=>{setPlanInicial(null);setModalPlan(true);}}>+ Nuevo plan</button>
            </div>
          </div>
          <input ref={pdfPlanRef} type="file" accept=".pdf" style={{display:"none"}} onChange={parsarPDF}/>
          {cargandoTab ? (
            <div style={{display:"grid",gap:"10px"}}>{[1,2].map(i=><div key={i} style={{height:"120px",borderRadius:"12px"}} className="skeleton"/>)}</div>
          ) : !planes||planes.length===0 ? (
            <div className="empty-state" style={{padding:"36px 20px"}}>
              <div className="empty-icon">📋</div>
              <div className="empty-title">Sin planes de pago</div>
              <div className="empty-desc">Cargá el primer plan consolidado.</div>
            </div>
          ) : (
            <div>
              {planes.filter(p=>p.estado==="activo").map(p=>{
                const pct = p.total_cuotas>0 ? Math.min((p.cuotas_pagas||0)/p.total_cuotas,1) : 0;
                return (
                  <div key={p.id} className="plan-card">
                    <div className="plan-card-top">
                      <div>
                        <div className="plan-num">{p.numero_plan||"—"}</div>
                        <div style={{fontSize:"11px",color:"var(--muted)",marginTop:"2px"}}>Consolidado: {formatArgDate(p.fecha_consolidacion)}</div>
                      </div>
                      <span className="plan-org-badge">{p.organismo||"ARCA"}</span>
                    </div>
                    <div className="plan-meta">
                      <div className="plan-meta-item">Cuotas pagas: <strong>{p.cuotas_pagas||0}/{p.total_cuotas||"?"}</strong></div>
                      <div className="plan-meta-item">Próx. venc.: <strong>{formatArgDate(p.proximo_venc)}</strong></div>
                      {p.monto_primer_venc&&<div className="plan-meta-item">1ra cuota: <strong>{$$(p.monto_primer_venc)}</strong></div>}
                      {p.monto_segundo_venc&&<div className="plan-meta-item">2da cuota: <strong>{$$(p.monto_segundo_venc)}</strong></div>}
                    </div>
                    {p.total_cuotas>0&&(
                      <div>
                        <div className="plan-progress-label"><span>{Math.round(pct*100)}% pagado</span><span>{p.cuotas_pagas||0} de {p.total_cuotas}</span></div>
                        <div className="plan-progress-track"><div className="plan-progress-fill" style={{width:`${pct*100}%`}}/></div>
                      </div>
                    )}
                    <div className="plan-actions">
                      <button className="table-action" onClick={()=>marcarCuotaPagada(p.id)}>✓ Pagar cuota</button>
                      <button className="table-action success" onClick={()=>cambiarEstadoPlan(p.id,"cancelado")}>✅ Cancelado</button>
                      <button className="table-action danger" onClick={()=>cambiarEstadoPlan(p.id,"caido")}>✗ Caído</button>
                      <button className="table-action" style={{color:"var(--muted)",fontSize:"11px"}} onClick={()=>cambiarEstadoPlan(p.id,"inactivo")} title="Eliminar">🗑</button>
                      {p.url_pdf&&<a className="table-action" href={p.url_pdf} target="_blank" rel="noopener" style={{textDecoration:"none"}}>↗ PDF</a>}
                    </div>
                  </div>
                );
              })}
              {["cancelado","caido"].map(estado=>{
                const grupo=planes.filter(p=>p.estado===estado);
                if(!grupo.length) return null;
                const esCaido=estado==="caido";
                return (
                <div key={estado}>
                  <div style={{fontSize:"11px",fontWeight:"600",textTransform:"uppercase",letterSpacing:"0.08em",margin:"16px 0 10px",color:esCaido?"var(--red)":"var(--green)"}}>{esCaido?"Caídos":"Cancelados"}</div>
                  {grupo.map(p=>(
                    <div key={p.id} className={`plan-card ${estado}`}>
                      <div className="plan-card-top">
                        <div><div className="plan-num">{p.numero_plan||"—"}</div></div>
                        <span className="plan-org-badge">{p.organismo||"ARCA"}</span>
                      </div>
                      <div className="plan-meta">
                        <div className="plan-meta-item">Cuotas: <strong>{p.cuotas_pagas||0}/{p.total_cuotas||"?"}</strong></div>
                      </div>
                      <div className="plan-actions" style={{marginTop:"10px"}}>
                        <button className="table-action" onClick={()=>cambiarEstadoPlan(p.id,"activo")}>↩ Reactivar</button>
                        <button className="table-action danger" onClick={()=>cambiarEstadoPlan(p.id,"inactivo")} title="Eliminar">🗑</button>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
            </div>
          )}
          {modalPlan&&<ModalNuevoPlan slug={cliente.slug} onClose={()=>setModalPlan(false)} onGuardado={recargarPlanes} initialData={planInicial}/>}
        </div>
      )}

      {/* Tab: Documentos */}
      {tab==="documentos"&&(
        <div className="detail-section">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
            <div className="section-title" style={{marginBottom:0}}>Documentos</div>
            <button className="add-btn" style={{fontSize:"12px",padding:"8px 14px"}} onClick={()=>setModalDoc(true)}>+ Cargar documento</button>
          </div>
          {cargandoTab ? (
            <div style={{height:"80px",borderRadius:"8px"}} className="skeleton"/>
          ) : !docs||docs.length===0 ? (
            <div style={{textAlign:"center",padding:"28px",color:"var(--muted)",fontSize:"13px"}}>
              Sin documentos cargados para este cliente.
            </div>
          ) : docs.map((d,i)=>(
            <div key={i} className="doc-row">
              <div className="doc-info">
                <div className="doc-nombre">{d.nombre||d.url||"Documento"}</div>
                <div className="doc-meta">{d.tipo||""} {d.created_at?`· ${new Date(d.created_at).toLocaleDateString("es-AR")}`:""}</div>
              </div>
              {d.url&&<a className="doc-link" href={d.url} target="_blank" rel="noopener">↗ Abrir</a>}
            </div>
          ))}
        </div>
      )}

      {modalDoc&&<ModalCargarDocumento slug={cliente.slug} onClose={()=>setModalDoc(false)} onGuardado={()=>{setModalDoc(false);setDocs(null);setTimeout(()=>setTab("documentos"),50);}}/>}

      {/* Tab: Alertas */}
      {tab==="alertas"&&(
        <div>
          <div className="detail-section" style={{marginBottom:"16px"}}>
            <div className="section-title">Alertas activas</div>
            {cargandoTab ? (
              <div style={{height:"60px",borderRadius:"8px"}} className="skeleton"/>
            ) : !alertas||alertas.filter(a=>!a.leida).length===0 ? (
              <div style={{textAlign:"center",padding:"24px",color:"var(--muted)",fontSize:"13px"}}>Sin alertas activas.</div>
            ) : alertas.filter(a=>!a.leida).map(a=>(
              <div key={a.id} className={`alert-item ${a.tipo||"manual"}`}>
                <div className="alert-left">
                  <div className="alert-icon">{ICONO_ALERTA[a.tipo]||"📌"}</div>
                  <div>
                    <div className="alert-tipo-badge">{a.tipo||"manual"}</div>
                    <div className="alert-text">{a.mensaje}</div>
                  </div>
                </div>
                <button className="alert-del" onClick={()=>eliminarAlerta(a.id)}>×</button>
              </div>
            ))}
          </div>
          <div className="alert-form">
            <div style={{fontSize:"13px",fontWeight:"600",marginBottom:"12px"}}>Crear alerta</div>
            <div className="form-row" style={{marginBottom:"10px"}}>
              <select className="form-input" style={{fontSize:"13px"}} value={nuevaAlerta.tipo} onChange={e=>setNuevaAlerta(p=>({...p,tipo:e.target.value}))}>
                {TIPOS_ALERTA.map(t=><option key={t} value={t}>{ICONO_ALERTA[t]} {t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
              </select>
              <input className="form-input" style={{fontSize:"13px"}} value={nuevaAlerta.mensaje} onChange={e=>setNuevaAlerta(p=>({...p,mensaje:e.target.value}))} placeholder="Detalle de la alerta..." onKeyDown={e=>e.key==="Enter"&&crearAlerta()}/>
            </div>
            <button className="btn-primary" style={{padding:"10px"}} onClick={crearAlerta} disabled={!nuevaAlerta.mensaje.trim()}>Crear alerta</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Vista planes (global) ──
function ViewPlanes({ clientes }) {
  const [planes, setPlanes]         = useState([]);
  const [loading, setLoading]       = useState(true);
  const [expandido, setExpandido]   = useState(null);
  const [cuotasMap, setCuotasMap]   = useState({});
  const [cargandoMap, setCargandoMap] = useState({});
  const clienteMap = Object.fromEntries(clientes.map(c=>[c.id,c]));

  useEffect(()=>{
    apiFetch(`${BACKEND_URL}/planes`)
      .then(r=>r.json()).then(d=>{setPlanes(Array.isArray(d)?d:[]);setLoading(false);})
      .catch(()=>setLoading(false));
  },[]);

  async function marcarPagado(planId) {
    const res = await apiFetch(`${BACKEND_URL}/planes/${planId}/pagar`,{method:"PATCH"});
    const d = await res.json();
    if (d.ok) setPlanes(prev=>prev.map(p=>p.id===planId?{...p,cuotas_pagas:d.cuotas_pagas,estado:d.estado}:p));
  }

  async function cambiarEstadoPlan(planId, nuevoEstado) {
    const msgs = {
      cancelado:"¿Marcar como CANCELADO (pagado por completo)?",
      caido:"¿Marcar como CAÍDO (en incumplimiento)?",
      inactivo:"¿Eliminar este plan? No aparecerá más en la lista.",
    };
    if (!confirm(msgs[nuevoEstado]||"¿Confirmar?")) return;
    await apiFetch(`${BACKEND_URL}/planes/${planId}/estado`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({estado:nuevoEstado})});
    setPlanes(prev=>prev.map(p=>p.id===planId?{...p,estado:nuevoEstado}:p));
  }

  async function abrirPlan(planId) {
    if (expandido===planId) { setExpandido(null); return; }
    setExpandido(planId);
    if (!cuotasMap[planId]) {
      setCargandoMap(prev=>({...prev,[planId]:true}));
      try {
        const res = await apiFetch(`${BACKEND_URL}/planes/${planId}/cuotas`);
        const d = await res.json();
        setCuotasMap(prev=>({...prev,[planId]:d.cuotas||[]}));
      } catch {}
      setCargandoMap(prev=>({...prev,[planId]:false}));
    }
  }

  async function pagarCuota(planId, numeroCuota, vencimiento) {
    const res = await apiFetch(`${BACKEND_URL}/planes/${planId}/cuotas/${numeroCuota}/pagar`,{
      method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({vencimiento})
    });
    const d = await res.json();
    if (d.ok) {
      setCuotasMap(prev=>({...prev,[planId]:(prev[planId]||[]).map(c=>c.numero_cuota===numeroCuota?{
        ...c,
        pagado_primer_venc: vencimiento==="1ro"?true:c.pagado_primer_venc,
        pagado_segundo_venc: vencimiento==="1ro"?false:(vencimiento==="2do"?true:c.pagado_segundo_venc),
      }:c)}));
      setPlanes(prev=>prev.map(p=>p.id===planId?{...p,cuotas_pagas:d.cuotas_pagas,estado:d.estado,proximo_venc:d.proximo_venc||p.proximo_venc}:p));
    }
  }

  const activos = planes.filter(p=>p.estado==="activo"||!p.estado);

  return (
    <div>
      <div style={{marginBottom:"20px"}}>
        <div style={{fontSize:"13px",color:"var(--muted)"}}>Vencimientos</div>
        <div style={{fontSize:"20px",fontWeight:"700",marginTop:"2px"}}>Planes de pago activos</div>
      </div>
      {loading ? (
        <div style={{display:"grid",gap:"8px"}}>{[1,2,3].map(i=><div key={i} style={{height:"52px",borderRadius:"10px"}} className="skeleton"/>)}</div>
      ) : activos.length===0 ? (
        <div className="empty-state">
          <div className="empty-icon">📋</div>
          <div className="empty-title">Sin planes activos</div>
          <div className="empty-desc">Los planes se cargan desde el detalle de cada cliente.</div>
        </div>
      ) : (
        <div className="table-wrap">
          <table className="data-table">
            <thead>
              <tr>
                <th>Cliente</th><th>Nro. plan</th><th>Organismo</th><th>Cuotas</th><th>Próx. vencimiento</th><th>1ra cuota</th><th></th>
              </tr>
            </thead>
            <tbody>
              {activos.map(p=>{
                const c = clienteMap[p.cliente_id];
                const pct = p.total_cuotas>0 ? (p.cuotas_pagas||0)/p.total_cuotas : 0;
                const abierto = expandido===p.id;
                const cuotas = cuotasMap[p.id]||[];
                const cargando = cargandoMap[p.id];
                return (
                  <React.Fragment key={p.id}>
                    <tr style={{cursor:"pointer",background:abierto?"var(--light)":"transparent"}} onClick={()=>abrirPlan(p.id)}>
                      <td>
                        {c ? (
                          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                            <div style={{width:"28px",height:"28px",borderRadius:"50%",background:"linear-gradient(135deg,#2BAF82,#1B2D4F)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"700",color:"#fff",flexShrink:0}}>{initials(c.nombre,c.apellido)}</div>
                            <div style={{fontWeight:"600"}}>{c.nombre} {c.apellido}</div>
                          </div>
                        ) : "—"}
                      </td>
                      <td style={{fontFamily:"'DM Mono',monospace",fontWeight:"600"}}>{p.numero_plan||"—"}</td>
                      <td><span className="plan-org-badge">{p.organismo||"ARCA"}</span></td>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                          <span>{p.cuotas_pagas||0}/{p.total_cuotas||"?"}</span>
                          {p.total_cuotas>0&&<div style={{width:"50px",height:"4px",background:"var(--light)",borderRadius:"4px",overflow:"hidden"}}><div style={{height:"100%",background:"var(--green)",width:`${pct*100}%`,borderRadius:"4px"}}/></div>}
                        </div>
                      </td>
                      <td style={{fontWeight:"500"}}>{formatArgDate(p.proximo_venc)}</td>
                      <td style={{fontFamily:"'DM Mono',monospace"}}>{$$(p.monto_primer_venc)}</td>
                      <td>
                        <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}} onClick={e=>e.stopPropagation()}>
                          <button className="table-action" onClick={()=>marcarPagado(p.id)}>✓ Pagar</button>
                          <button className="table-action success" onClick={()=>cambiarEstadoPlan(p.id,"cancelado")}>✅ Cancelado</button>
                          <button className="table-action danger" onClick={()=>cambiarEstadoPlan(p.id,"caido")}>✗ Caído</button>
                          <button className="table-action" style={{color:"var(--muted)",borderColor:"var(--light)"}} onClick={()=>cambiarEstadoPlan(p.id,"inactivo")}>🗑</button>
                        </div>
                      </td>
                    </tr>
                    {abierto&&(
                      <tr>
                        <td colSpan="7" style={{padding:"0",background:"var(--light)"}}>
                          <div style={{padding:"14px 20px",borderBottom:"1px solid var(--border)"}}>
                            {cargando ? (
                              <div style={{color:"var(--muted)",fontSize:"13px"}}>Cargando cuotas...</div>
                            ) : cuotas.length===0 ? (
                              <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
                                <div style={{color:"var(--muted)",fontSize:"13px"}}>Sin cuotas registradas.</div>
                                <button className="table-action success" style={{fontSize:"12px"}} onClick={async(e)=>{
                                  e.stopPropagation();
                                  try{
                                    const r=await apiFetch(`${BACKEND_URL}/planes/${p.id}/cuotas/inicializar`,{method:"POST"});
                                    const d=await r.json();
                                    if(d.ok) setCuotasMap(prev=>({...prev,[p.id]:d.cuotas||[]}));
                                  }catch{}
                                }}>Inicializar cuotas</button>
                              </div>
                            ) : (
                              <div>
                                <div style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr 110px 100px 100px",gap:"4px 12px",fontSize:"11px",color:"var(--muted)",fontWeight:"600",paddingBottom:"6px",borderBottom:"1px solid var(--border)",marginBottom:"4px"}}>
                                  <div>#</div><div>1er venc.</div><div>2do venc.</div><div>Fecha</div><div>Estado</div><div>Acción</div>
                                </div>
                                {cuotas.map(cu=>{
                                  const pagada = cu.pagado_primer_venc||cu.pagado_segundo_venc;
                                  const fecha = cu.fecha_venc ? new Date(cu.fecha_venc+"T12:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
                                  return (
                                    <div key={cu.numero_cuota} style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr 110px 100px 100px",gap:"4px 12px",fontSize:"13px",padding:"6px 0",borderBottom:"1px solid var(--border)",alignItems:"center",opacity:pagada?0.6:1}}>
                                      <div style={{fontWeight:"700",color:"var(--muted)"}}>{cu.numero_cuota}</div>
                                      <div style={{fontFamily:"'DM Mono',monospace"}}>{cu.pagado_primer_venc&&<span style={{color:"var(--green)"}}>✓ </span>}{$$(cu.monto_primer_venc)}</div>
                                      <div style={{fontFamily:"'DM Mono',monospace",color:"var(--muted)"}}>{cu.monto_segundo_venc ? <>{cu.pagado_segundo_venc&&<span style={{color:"var(--yellow)"}}>✓ </span>}{$$(cu.monto_segundo_venc)}</> : "—"}</div>
                                      <div style={{fontSize:"12px"}}>{fecha}</div>
                                      <div>
                                        {cu.pagado_primer_venc
                                          ? <span style={{color:"var(--green)",fontWeight:"600",fontSize:"11px"}}>✓ 1er venc.</span>
                                          : cu.pagado_segundo_venc
                                          ? <span style={{color:"var(--yellow)",fontWeight:"600",fontSize:"11px"}}>✓ 2do venc.</span>
                                          : <span style={{color:"var(--muted)",fontSize:"11px"}}>Pendiente</span>}
                                      </div>
                                      <div>
                                        {!pagada&&(
                                          <div style={{display:"flex",gap:"4px"}}>
                                            <button className="table-action" style={{fontSize:"11px",padding:"2px 7px"}} onClick={()=>pagarCuota(p.id,cu.numero_cuota,"1ro")}>1ro</button>
                                            {cu.monto_segundo_venc&&<button className="table-action" style={{fontSize:"11px",padding:"2px 7px",color:"var(--yellow)",borderColor:"var(--yellow)"}} onClick={()=>pagarCuota(p.id,cu.numero_cuota,"2do")}>2do</button>}
                                          </div>
                                        )}
                                      </div>
                                    </div>
                                  );
                                })}
                                <div style={{marginTop:"8px",fontSize:"12px",color:"var(--muted)"}}>
                                  {cuotas.filter(c=>c.pagado_primer_venc||c.pagado_segundo_venc).length} pagadas · {cuotas.filter(c=>!c.pagado_primer_venc&&!c.pagado_segundo_venc).length} pendientes
                                </div>
                              </div>
                            )}
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── Historial cuotas mensuales ──
function HistorialCuotas({ slug, cuota, categoria, onToggleMesActual }) {
  const [historial, setHistorial]       = useState([]);
  const [deudaManual, setDeudaManual]   = useState([]);
  const [cargando, setCargando]         = useState(true);
  const [mostrarForm, setMostrarForm]   = useState(false);
  const [mostrarDeudas, setMostrarDeudas] = useState(true);
  const [formOrg, setFormOrg]           = useState("ARCA");
  const [formMonto, setFormMonto]       = useState("");
  const [formDesc, setFormDesc]         = useState("");
  const [guardando, setGuardando]       = useState(false);
  const hoy = new Date();

  function cargarHistorial() {
    apiFetch(`${BACKEND_URL}/clientes/${slug}/historial-cuotas`)
      .then(r=>r.json()).then(d=>setHistorial(d.historial||[])).catch(()=>{});
  }
  function cargarDeudas() {
    apiFetch(`${BACKEND_URL}/clientes/${slug}/deuda-manual`)
      .then(r=>r.json()).then(d=>setDeudaManual(d.deudas||[])).catch(()=>{});
  }
  useEffect(()=>{
    setCargando(true);
    Promise.all([
      apiFetch(`${BACKEND_URL}/clientes/${slug}/historial-cuotas`).then(r=>r.json()),
      apiFetch(`${BACKEND_URL}/clientes/${slug}/deuda-manual`).then(r=>r.json()),
    ]).then(([hd, dd])=>{
      setHistorial(hd.historial||[]);
      setDeudaManual(dd.deudas||[]);
      setCargando(false);
    }).catch(()=>setCargando(false));
  },[slug]);

  async function toggleMes(h) {
    const nuevoPagado = !h.pagado;
    setHistorial(prev=>prev.map(x=>x.año===h.año&&x.mes===h.mes?{...x,pagado:nuevoPagado}:x));
    if (h.año===hoy.getFullYear()&&h.mes===hoy.getMonth()+1) onToggleMesActual&&onToggleMesActual(nuevoPagado);
    await apiFetch(`${BACKEND_URL}/clientes/${slug}/historial-cuotas/${h.año}/${h.mes}`,{
      method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({pagado:nuevoPagado})
    }).catch(()=>{});
  }

  async function pagarDeuda(d) {
    setDeudaManual(prev=>prev.filter(x=>x.id!==d.id));
    await apiFetch(`${BACKEND_URL}/deuda-manual/${d.id}/pagar`,{method:"PATCH"}).catch(()=>{});
  }

  async function eliminarDeuda(d) {
    setDeudaManual(prev=>prev.filter(x=>x.id!==d.id));
    await apiFetch(`${BACKEND_URL}/deuda-manual/${d.id}`,{method:"DELETE"}).catch(()=>{});
  }

  async function agregarDeuda() {
    const monto = parseFloat(formMonto.replace(/\./g,"").replace(",","."));
    if (!formMonto||isNaN(monto)||monto<=0) { alert("Ingresá un monto válido"); return; }
    setGuardando(true);
    const res = await apiFetch(`${BACKEND_URL}/clientes/${slug}/deuda-manual`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({organismo:formOrg,monto,descripcion:formDesc})
    }).then(r=>r.json()).catch(()=>null);
    if (res?.ok && res.deuda) setDeudaManual(prev=>[...prev, res.deuda]);
    setFormMonto(""); setFormDesc(""); setMostrarForm(false); setGuardando(false);
  }

  if (cargando) return <div style={{color:"var(--muted)",fontSize:"13px",padding:"8px 0"}}>Cargando historial...</div>;

  const artPorMes = (ART_RIO_NEGRO_2026[categoria] || 0);
  const hoyDia    = hoy.getDate();
  const pendientes6 = historial.filter(h=>!h.pagado);
  const vencidos6   = pendientes6.filter(h=>{ const e=h.año===hoy.getFullYear()&&h.mes===hoy.getMonth()+1; return !e||hoyDia>20; });
  const sinVencer   = pendientes6.filter(h=>{ const e=h.año===hoy.getFullYear()&&h.mes===hoy.getMonth()+1; return e&&hoyDia<=20; });

  const deudaART_hist  = vencidos6.length * artPorMes;
  const deudaARCA_hist = vencidos6.length*((cuota||0)-artPorMes) + sinVencer.length*(cuota||0);
  const deudaART_man   = deudaManual.filter(d=>d.organismo==="ART").reduce((s,d)=>s+d.monto,0);
  const deudaARCA_man  = deudaManual.filter(d=>d.organismo==="ARCA").reduce((s,d)=>s+d.monto,0);
  const deudaART   = deudaART_hist + deudaART_man;
  const deudaARCA  = deudaARCA_hist + deudaARCA_man;
  const deudaTotal = deudaART + deudaARCA;

  return (
    <div>
      {/* Chip de deuda */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
        <div style={{fontSize:"11px",fontWeight:"600",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.05em"}}>Últimos 6 meses · Cuota {$$(cuota)}</div>
        {deudaTotal>0 ? (
          <div style={{background:"#E0454510",border:"1px solid var(--red)",borderRadius:"8px",padding:"6px 12px"}}>
            <div style={{display:"flex",gap:"8px",alignItems:"center",marginBottom:"4px"}}>
              <span style={{fontSize:"11px",color:"var(--red)",fontWeight:"600"}}>Deuda estimada</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontWeight:"700",color:"var(--red)",fontSize:"14px"}}>{$$(deudaTotal)}</span>
            </div>
            <div style={{display:"flex",gap:"14px",fontSize:"11px",color:"var(--muted)"}}>
              {deudaART>0&&<span>ART Río Negro: <b style={{color:"var(--red)"}}>{$$(deudaART)}</b></span>}
              {deudaARCA>0&&<span>ARCA: <b style={{color:"var(--red)"}}>{$$(deudaARCA)}</b></span>}
            </div>
          </div>
        ) : (
          <div style={{background:"#2BAF8210",border:"1px solid var(--green)",borderRadius:"8px",padding:"4px 12px"}}>
            <span style={{fontSize:"11px",color:"var(--green)",fontWeight:"600"}}>Sin deuda ✓</span>
          </div>
        )}
      </div>

      {/* Grid 6 meses */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px"}}>
        {historial.map(h=>{
          const esMesActual = h.año===hoy.getFullYear()&&h.mes===hoy.getMonth()+1;
          return (
            <div key={`${h.año}-${h.mes}`} style={{border:`1px solid ${h.pagado?"var(--green)":"var(--border)"}`,borderRadius:"8px",padding:"10px 12px",background:h.pagado?"#2BAF8208":"transparent"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"5px"}}>
                <span style={{fontSize:"12px",fontWeight:"600"}}>{MESES_FULL[h.mes-1]} {h.año}</span>
                {esMesActual&&<span style={{fontSize:"10px",background:"var(--blue)",color:"#fff",borderRadius:"4px",padding:"1px 5px",fontWeight:"600"}}>Actual</span>}
              </div>
